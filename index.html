<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGE OF WAR - REMASTERED 🏹⚔️</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(180deg, #0a0f1e 0%, #1a1f2e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            padding: 10px;
        }

        #gameContainer {
            width: 1000px;
            max-width: 100%;
            background: #2a2a3a;
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 0 20px #4a4a6a;
            border: 3px solid #6a6a8a;
        }

        /* Hlavní herní plocha */
        #battlefield {
            position: relative;
            width: 100%;
            height: 350px;
            background: linear-gradient(90deg, #3d2b1a 0%, #5d4b3a 50%, #2d3a4a 100%);
            border: 4px solid #8b7d6b;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 15px;
            box-shadow: inset 0 -20px 20px rgba(0,0,0,0.6);
        }

        /* Základny */
        .base {
            position: absolute;
            bottom: 0;
            width: 140px;
            height: 200px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: bottom center;
            transition: all 0.3s ease;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.5));
            z-index: 5;
        }

        #playerBase {
            left: 10px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120"><path d="M20,120 L20,80 L40,60 L60,60 L80,80 L80,120 L70,120 L70,90 L30,90 L30,120 Z" fill="%2344aaff" stroke="%23ffffff" stroke-width="2"/><rect x="35" y="40" width="30" height="20" fill="%23ffaa44"/><circle cx="50" cy="30" r="8" fill="%23ffdd44"/></svg>');
        }

        #enemyBase {
            right: 10px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120"><path d="M20,120 L20,80 L40,60 L60,60 L80,80 L80,120 L70,120 L70,90 L30,90 L30,120 Z" fill="%23ff4444" stroke="%23ffffff" stroke-width="2"/><rect x="35" y="40" width="30" height="20" fill="%23888888"/><circle cx="50" cy="30" r="8" fill="%23aa0000"/></svg>');
        }

        /* Zdraví základen */
        .base-health {
            position: absolute;
            bottom: 180px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 15px;
            background: #333;
            border: 2px solid #000;
            border-radius: 10px;
            overflow: hidden;
        }

        #playerBaseHealthFill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #44ff44, #88ff88);
            transition: width 0.2s;
        }

        #enemyBaseHealthFill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ff8888);
            transition: width 0.2s;
        }

        /* Jednotky */
        .unit {
            position: absolute;
            bottom: 20px;
            width: 40px;
            height: 50px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            filter: drop-shadow(2px 2px 2px black);
            transition: left 0.1s linear;
            z-index: 10;
            cursor: pointer;
        }

        .unit.player-unit {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 50"><circle cx="20" cy="15" r="8" fill="%2344aaff"/><rect x="12" y="23" width="16" height="22" fill="%232266aa"/><circle cx="20" cy="40" r="5" fill="%23aa8866"/></svg>');
        }

        .unit.enemy-unit {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 50"><circle cx="20" cy="15" r="8" fill="%23ff4444"/><rect x="12" y="23" width="16" height="22" fill="%23aa2222"/><circle cx="20" cy="40" r="5" fill="%23aa8866"/></svg>');
        }

        /* Health bary jednotek */
        .unit-health-bar {
            position: absolute;
            top: -10px;
            left: 0;
            width: 40px;
            height: 5px;
            background: #000;
            border: 1px solid #fff;
        }

        .unit-health-fill {
            height: 100%;
            background: #44ff44;
            transition: width 0.1s;
        }

        /* Ovládací panel */
        #controlPanel {
            background: #1a1a2a;
            border: 3px solid #6a6a8a;
            border-radius: 15px;
            padding: 15px;
            color: #fff;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        /* Éra a XP */
        #eraPanel {
            flex: 1 1 200px;
            text-align: center;
            background: #2a2a3a;
            border-radius: 10px;
            padding: 10px;
            border: 2px solid #8a8aaa;
        }

        #eraName {
            font-size: 28px;
            font-weight: bold;
            color: #ffaa44;
            text-shadow: 0 0 10px #ffaa44;
        }

        #xpBar {
            width: 100%;
            height: 20px;
            background: #333;
            border-radius: 10px;
            margin: 10px 0;
            overflow: hidden;
        }

        #xpFill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #44ff44, #88ff88);
            transition: width 0.3s;
        }

        /* Jednotky a vylepšení */
        .units-container {
            flex: 2 1 400px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .unit-card {
            background: #2a2a3a;
            border: 3px solid #6a6a8a;
            border-radius: 15px;
            padding: 12px;
            min-width: 110px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 5px 0 #3a3a4a;
        }

        .unit-card:hover:not(.disabled) {
            transform: translateY(-2px);
            border-color: #ffaa44;
            box-shadow: 0 7px 0 #3a3a4a;
        }

        .unit-card:active:not(.disabled) {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #3a3a4a;
        }

        .unit-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(0.8);
        }

        .unit-icon {
            font-size: 40px;
            display: block;
        }

        .unit-cost {
            font-size: 14px;
            color: #ffaa44;
        }

        .unit-stats {
            font-size: 12px;
            color: #aaa;
        }

        .era-upgrade {
            background: #4a2a2a;
            border-color: #ff8844;
        }

        #gameStatus {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            margin-top: 10px;
            color: #ffaa44;
            text-shadow: 0 0 10px #ffaa44;
        }

        #restartBtn {
            background: #4a4a6a;
            border: 3px solid #8a8aaa;
            color: white;
            font-size: 24px;
            padding: 10px 30px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            box-shadow: 0 5px 0 #2a2a3a;
        }

        #restartBtn:hover {
            transform: translateY(-2px);
            border-color: #ffaa44;
        }

        #restartBtn:active {
            transform: translateY(5px);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <!-- Bojiště -->
        <div id="battlefield">
            <!-- Základny -->
            <div id="playerBase" class="base">
                <div class="base-health">
                    <div id="playerBaseHealthFill" style="width: 100%"></div>
                </div>
            </div>
            <div id="enemyBase" class="base">
                <div class="base-health">
                    <div id="enemyBaseHealthFill" style="width: 100%"></div>
                </div>
            </div>
            <!-- Sem se budou dynamicky přidávat jednotky -->
        </div>

        <!-- Ovládací panel -->
        <div id="controlPanel">
            <!-- Panel éry -->
            <div id="eraPanel">
                <div id="eraName">KAVENNÁ ÉRA</div>
                <div id="xpBar">
                    <div id="xpFill" style="width: 0%"></div>
                </div>
                <div id="xpText">XP: 0 / 100</div>
                <div id="eraBonus">🔥 Bonus: +0% poškození</div>
            </div>

            <!-- Jednotky -->
            <div class="units-container" id="unitsContainer">
                <!-- Dynamicky generováno JS -->
            </div>

            <!-- Ovládání -->
            <button id="restartBtn">🔄 RESTART</button>
        </div>

        <!-- Status hry -->
        <div id="gameStatus"></div>
    </div>

    <script>
        (function() {
            // === KONFIGURACE HRY ===
            const ERAS = [
                { name: "🏹 KAVENNÁ ÉRA", damageBonus: 0, upgradeCost: 100, unitMultiplier: 1, color: "#8b6b4b" },
                { name: "⚔️ STŘEDOVĚK", damageBonus: 30, upgradeCost: 200, unitMultiplier: 1.3, color: "#6b4b8b" },
                { name: "🔫 KOLONIÁLNÍ", damageBonus: 70, upgradeCost: 400, unitMultiplier: 1.7, color: "#4b6b8b" },
                { name: "💣 MODERNÍ", damageBonus: 120, upgradeCost: 800, unitMultiplier: 2.2, color: "#8b4b4b" },
                { name: "🤖 FUTURISTICKÁ", damageBonus: 200, upgradeCost: 1600, unitMultiplier: 3.0, color: "#4b8b4b" }
            ];

            const UNITS = [
                // Kávenná éra (0)
                { name: "Bojovník", cost: 20, damage: 8, hp: 40, era: 0, emoji: "🪓", attackSpeed: 1.0 },
                { name: "Lukostřelec", cost: 35, damage: 12, hp: 25, era: 0, emoji: "🏹", attackSpeed: 0.8 },
                // Středověk (1)
                { name: "Rytíř", cost: 45, damage: 20, hp: 70, era: 1, emoji: "⚔️", attackSpeed: 1.2 },
                { name: "Kata", cost: 60, damage: 30, hp: 50, era: 1, emoji: "🪓", attackSpeed: 1.0 },
                // Koloniální (2)
                { name: "Mušketýr", cost: 70, damage: 40, hp: 40, era: 2, emoji: "🔫", attackSpeed: 1.5 },
                { name: "Dělostřelec", cost: 100, damage: 60, hp: 30, era: 2, emoji: "💣", attackSpeed: 1.8 },
                // Moderní (3)
                { name: "Samopalník", cost: 120, damage: 80, hp: 60, era: 3, emoji: "🔫", attackSpeed: 0.6 },
                { name: "Granátník", cost: 150, damage: 120, hp: 50, era: 3, emoji: "💣", attackSpeed: 1.2 },
                // Futuristická (4)
                { name: "Vesmírný mariňák", cost: 200, damage: 180, hp: 100, era: 4, emoji: "🤖", attackSpeed: 0.9 },
                { name: "Destroyer", cost: 300, damage: 300, hp: 150, era: 4, emoji: "👾", attackSpeed: 1.4 }
            ];

            // Herní stav
            let playerBaseHP = 1000;
            let playerBaseMaxHP = 1000;
            let enemyBaseHP = 1000;
            let enemyBaseMaxHP = 1000;

            let currentEra = 0;
            let xp = 0;
            let xpToNextEra = 100;

            let playerUnits = [];
            let enemyUnits = [];

            let gameLoopInterval = null;
            let gameRunning = true;
            let gameOver = false;
            let gameWin = false;

            // Dom elementy
            const battlefield = document.getElementById('battlefield');
            const playerBaseHealthFill = document.getElementById('playerBaseHealthFill');
            const enemyBaseHealthFill = document.getElementById('enemyBaseHealthFill');
            const eraNameEl = document.getElementById('eraName');
            const xpFill = document.getElementById('xpFill');
            const xpText = document.getElementById('xpText');
            const eraBonusEl = document.getElementById('eraBonus');
            const gameStatus = document.getElementById('gameStatus');
            const unitsContainer = document.getElementById('unitsContainer');
            const restartBtn = document.getElementById('restartBtn');

            // === POMOCNÉ FUNKCE ===
            function formatNumber(n) {
                return Math.floor(n);
            }

            // Update UI
            function updateUI() {
                // Základny HP
                playerBaseHealthFill.style.width = (playerBaseHP / playerBaseMaxHP * 100) + '%';
                enemyBaseHealthFill.style.width = (enemyBaseHP / enemyBaseMaxHP * 100) + '%';

                // Éra a XP
                eraNameEl.textContent = ERAS[currentEra].name;
                xpFill.style.width = (xp / xpToNextEra * 100) + '%';
                xpText.textContent = `XP: ${xp} / ${xpToNextEra}`;
                eraBonusEl.textContent = `🔥 Bonus: +${ERAS[currentEra].damageBonus}% poškození`;

                // Status hry
                if (playerBaseHP <= 0) {
                    gameStatus.textContent = '💀 PROHRA - Nepřítel zničil tvou základnu! 💀';
                    gameRunning = false;
                } else if (enemyBaseHP <= 0) {
                    gameStatus.textContent = '🏆 VÍTĚZSTVÍ - Zničil jsi nepřátelskou základnu! 🏆';
                    gameRunning = false;
                } else {
                    gameStatus.textContent = '⚔️ BOJ PROBÍHÁ ⚔️';
                }

                // Vykreslení jednotek
                renderUnits();

                // Vykreslení tlačítek jednotek
                renderUnitButtons();
            }

            // Vykreslení jednotek na bojišti
            function renderUnits() {
                // Smazat staré jednotky
                document.querySelectorAll('.unit').forEach(u => u.remove());

                // Vykreslit hráčovy jednotky
                playerUnits.forEach((unit, index) => {
                    const unitEl = document.createElement('div');
                    unitEl.className = 'unit player-unit';
                    unitEl.id = `player-unit-${index}`;
                    unitEl.style.left = (50 + (index * 30) % 200) + 'px';
                    unitEl.style.bottom = '20px';
                    
                    // Health bar
                    const healthBar = document.createElement('div');
                    healthBar.className = 'unit-health-bar';
                    const healthFill = document.createElement('div');
                    healthFill.className = 'unit-health-fill';
                    healthFill.style.width = (unit.hp / unit.maxHp * 100) + '%';
                    healthBar.appendChild(healthFill);
                    unitEl.appendChild(healthBar);

                    battlefield.appendChild(unitEl);
                });

                // Vykreslit nepřátelské jednotky
                enemyUnits.forEach((unit, index) => {
                    const unitEl = document.createElement('div');
                    unitEl.className = 'unit enemy-unit';
                    unitEl.id = `enemy-unit-${index}`;
                    unitEl.style.right = (50 + (index * 30) % 200) + 'px';
                    unitEl.style.bottom = '20px';
                    
                    // Health bar
                    const healthBar = document.createElement('div');
                    healthBar.className = 'unit-health-bar';
                    const healthFill = document.createElement('div');
                    healthFill.className = 'unit-health-fill';
                    healthFill.style.width = (unit.hp / unit.maxHp * 100) + '%';
                    healthBar.appendChild(healthFill);
                    unitEl.appendChild(healthBar);

                    battlefield.appendChild(unitEl);
                });
            }

            // Vykreslení tlačítek jednotek
            function renderUnitButtons() {
                unitsContainer.innerHTML = '';
                
                // Dostupné jednotky pro aktuální éru a nižší
                const availableUnits = UNITS.filter(u => u.era <= currentEra);
                
                availableUnits.forEach((unit, index) => {
                    const card = document.createElement('div');
                    card.className = 'unit-card';
                    
                    // Zjisti jestli máme dost XP na spawn (cena je v XP)
                    const hasEnoughXP = xp >= unit.cost;
                    if (!hasEnoughXP) {
                        card.classList.add('disabled');
                    }

                    card.innerHTML = `
                        <span class="unit-icon">${unit.emoji}</span>
                        <strong>${unit.name}</strong>
                        <div class="unit-cost">💰 ${unit.cost} XP</div>
                        <div class="unit-stats">⚔️ ${unit.damage} | ❤️ ${unit.hp}</div>
                    `;

                    card.addEventListener('click', () => {
                        if (hasEnoughXP && gameRunning && !gameOver && playerBaseHP > 0 && enemyBaseHP > 0) {
                            spawnUnit(unit);
                        }
                    });

                    unitsContainer.appendChild(card);
                });

                // Přidat tlačítko pro upgrade éry
                if (currentEra < ERAS.length - 1) {
                    const upgradeCard = document.createElement('div');
                    upgradeCard.className = 'unit-card era-upgrade';
                    const upgradeCost = ERAS[currentEra].upgradeCost;
                    const hasEnoughXP = xp >= upgradeCost;
                    
                    if (!hasEnoughXP) {
                        upgradeCard.classList.add('disabled');
                    }

                    upgradeCard.innerHTML = `
                        <span class="unit-icon">⬆️</span>
                        <strong>NOVÁ ÉRA</strong>
                        <div class="unit-cost">💰 ${upgradeCost} XP</div>
                        <div class="unit-stats">➡️ ${ERAS[currentEra+1].name}</div>
                    `;

                    upgradeCard.addEventListener('click', () => {
                        if (hasEnoughXP && gameRunning && currentEra < ERAS.length - 1) {
                            xp -= upgradeCost;
                            currentEra++;
                            updateUI();
                        }
                    });

                    unitsContainer.appendChild(upgradeCard);
                }
            }

            // Spawn jednotky
            function spawnUnit(unitTemplate) {
                if (xp < unitTemplate.cost) return;
                
                xp -= unitTemplate.cost;
                
                // Vytvoř jednotku s bonusy z éry
                const eraBonus = ERAS[currentEra].damageBonus / 100;
                const newUnit = {
                    ...unitTemplate,
                    maxHp: unitTemplate.hp * ERAS[currentEra].unitMultiplier,
                    hp: unitTemplate.hp * ERAS[currentEra].unitMultiplier,
                    damage: unitTemplate.damage * (1 + eraBonus),
                    attackCooldown: 0,
                    type: 'player'
                };
                
                playerUnits.push(newUnit);
                updateUI();
            }

            // AI nepřítele - spawnuje jednotky
            function enemyAI() {
                if (!gameRunning || enemyBaseHP <= 0 || playerBaseHP <= 0) return;

                // Urči éru nepřítele (stejná jako hráč nebo o jednu nižší)
                const enemyEra = Math.max(0, currentEra - 1 + Math.floor(Math.random() * 2)); // Občas o éru výš
                const availableUnits = UNITS.filter(u => u.era <= enemyEra);
                
                // Náhodná jednotka
                if (availableUnits.length > 0 && Math.random() < 0.3) { // 30% šance každý tick
                    const unit = availableUnits[Math.floor(Math.random() * availableUnits.length)];
                    
                    // Nepřítel má neomezené XP, ale omezíme frekvenci
                    const newUnit = {
                        ...unit,
                        maxHp: unit.hp * ERAS[enemyEra].unitMultiplier,
                        hp: unit.hp * ERAS[enemyEra].unitMultiplier,
                        damage: unit.damage * (1 + (ERAS[enemyEra].damageBonus / 100)),
                        attackCooldown: 0,
                        type: 'enemy'
                    };
                    
                    enemyUnits.push(newUnit);
                }
            }

            // Bojový systém
            function combatTick() {
                if (!gameRunning) return;

                // Hráčské jednotky útočí na nepřátelské
                for (let i = playerUnits.length - 1; i >= 0; i--) {
                    const playerUnit = playerUnits[i];
                    
                    if (enemyUnits.length > 0) {
                        // Útok na první nepřátelskou jednotku
                        const target = enemyUnits[0];
                        target.hp -= playerUnit.damage;
                        
                        // Přidání XP za zásah
                        xp += Math.floor(playerUnit.damage / 5);
                        
                        if (target.hp <= 0) {
                            enemyUnits.shift(); // Odstranit mrtvou jednotku
                            xp += 20; // Bonus za zabití
                        }
                    } else {
                        // Žádný nepřítel, útok na základnu
                        enemyBaseHP -= playerUnit.damage / 2;
                        xp += Math.floor(playerUnit.damage / 10);
                        
                        if (enemyBaseHP <= 0) {
                            enemyBaseHP = 0;
                            gameRunning = false;
                            gameWin = true;
                        }
                    }
                }

                // Nepřátelské jednotky útočí
                for (let i = enemyUnits.length - 1; i >= 0; i--) {
                    const enemyUnit = enemyUnits[i];
                    
                    if (playerUnits.length > 0) {
                        // Útok na první hráčskou jednotku
                        const target = playerUnits[0];
                        target.hp -= enemyUnit.damage;
                        
                        if (target.hp <= 0) {
                            playerUnits.shift(); // Odstranit mrtvou jednotku
                        }
                    } else {
                        // Žádný hráč, útok na základnu
                        playerBaseHP -= enemyUnit.damage / 2;
                        
                        if (playerBaseHP <= 0) {
                            playerBaseHP = 0;
                            gameRunning = false;
                            gameOver = true;
                        }
                    }
                }

                // Limit XP pro upgrade
                if (xp > xpToNextEra && currentEra < ERAS.length - 1) {
                    xp = xpToNextEra; // Zastaví XP na maximu pro aktuální éru
                }

                updateUI();
            }

            // Hlavní herní smyčka
            function gameLoop() {
                if (!gameRunning) return;
                
                enemyAI();
                combatTick();
            }

            // Restart hry
            function restartGame() {
                playerBaseHP = 1000;
                playerBaseMaxHP = 1000;
                enemyBaseHP = 1000;
                enemyBaseMaxHP = 1000;
                
                currentEra = 0;
                xp = 0;
                xpToNextEra = 100;
                
                playerUnits = [];
                enemyUnits = [];
                
                gameRunning = true;
                gameOver = false;
                gameWin = false;
                
                updateUI();
            }

            // Event listenery
            restartBtn.addEventListener('click', restartGame);

            // Spustit herní smyčku (každých 200ms)
            setInterval(gameLoop, 200);

            // Inicializace
            updateUI();
            renderUnitButtons();

            // Přidat základní XP na začátek
            xp = 50;
            updateUI();
        })();
    </script>
</body>
</html>
