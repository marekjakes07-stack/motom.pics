<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tetris – propracovaná verze</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #111;
      color: #eee;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      user-select: none;
    }

    #container {
      display: flex;
      gap: 40px;
      align-items: flex-start;
    }

    #game-area {
      position: relative;
    }

    canvas {
      image-rendering: pixelated;
      border: 2px solid #444;
      background: #000;
      box-shadow: 0 0 30px rgba(0,255,180,0.15);
    }

    #side-panel {
      width: 180px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .box {
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 12px;
      text-align: center;
    }

    #next-canvas, #hold-canvas {
      background: #000;
      border: 1px solid #555;
    }

    h2 { margin: 0 0 8px 0; font-size: 1.1rem; color: #0f8; }
    .stat { font-size: 1.4rem; font-weight: bold; color: #0ff; }

    #message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 3.5rem;
      color: #f44;
      text-shadow: 0 0 20px #f00;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
    }

    #pause-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      color: #ff0;
      font-weight: bold;
      text-shadow: 0 0 30px #ff0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
  </style>
</head>
<body>

<div id="container">
  <div id="game-area">
    <canvas id="tetris" width="300" height="600"></canvas>
    <div id="message">GAME OVER</div>
    <div id="pause-overlay">PAUSE</div>
  </div>

  <div id="side-panel">
    <div class="box">
      <h2>Score</h2>
      <div id="score" class="stat">0</div>
    </div>
    <div class="box">
      <h2>Level</h2>
      <div id="level" class="stat">1</div>
    </div>
    <div class="box">
      <h2>Lines</h2>
      <div id="lines" class="stat">0</div>
    </div>

    <div class="box">
      <h2>Next</h2>
      <canvas id="next" width="120" height="120"></canvas>
    </div>

    <div class="box">
      <h2>Hold</h2>
      <canvas id="hold" width="120" height="120"></canvas>
    </div>

    <div class="box" style="font-size:0.9rem; color:#aaa; text-align:left;">
      <strong>Ovládání:</strong><br>
      ← →    Pohyb<br>
      ↑      Otočit<br>
      ↓      Rychleji dolů<br>
      Mezerník  Hard drop<br>
      C      Hold / vyměnit<br>
      P      Pauza
    </div>
  </div>
</div>

<script>
// ================================================
//               TETRIS – 2025 edice
// ================================================

const canvas = document.getElementById('tetris');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('next');
const nextCtx = nextCanvas.getContext('2d');
const holdCanvas = document.getElementById('hold');
const holdCtx = holdCanvas.getContext('2d');

const COLS = 10;
const ROWS = 20;
const BLOCK = 30;

let board = Array(ROWS).fill().map(()=>Array(COLS).fill(0));
let score = 0;
let lines = 0;
let level = 1;
let dropCounter = 0;
let dropInterval = 1000;
let lastTime = 0;
let gameOver = false;
let paused = false;

let currentPiece = null;
let nextPiece = null;
let heldPiece = null;
let canHold = true;

const colors = [
  null,
  '#00FFFF', // I cyan
  '#FFFF00', // O yellow
  '#800080', // T purple
  '#00FF00', // S green
  '#FF0000', // Z red
  '#0000FF', // J blue
  '#FFA500'  // L orange
];

// Tetromino tvary (0° rotace)
const tetrominoes = [
  null,
  [[1,1,1,1]],                             // I
  [[1,1],[1,1]],                           // O
  [[0,1,0],[1,1,1]],                       // T
  [[0,1,1],[1,1,0]],                       // S
  [[1,1,0],[0,1,1]],                       // Z
  [[1,0,0],[1,1,1]],                       // J
  [[0,0,1],[1,1,1]]                        // L
];

function createPiece(type) {
  const p = tetrominoes[type];
  const matrix = Array(4).fill().map(()=>Array(4).fill(0));
  p.forEach((row,y)=>{
    row.forEach((val,x)=>{
      if (val) matrix[y+1][x+1] = type;   // offset pro lepší rotaci
    });
  });
  return { matrix, type, x: COLS/2-2|0, y: 0 };
}

function getRandomPiece() {
  return Math.floor(Math.random()*7)+1;
}

function drawBlock(ctx, x, y, color, size = BLOCK) {
  ctx.fillStyle = color;
  ctx.fillRect(x*size, y*size, size-1, size-1);
  
  // lesklý efekt
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fillRect(x*size+2, y*size+2, size*0.35, size*0.35);
  
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1;
  ctx.strokeRect(x*size, y*size, size-1, size-1);
}

function drawBoard() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // mřížka (velmi jemná)
  ctx.strokeStyle = '#111';
  ctx.lineWidth = 1;
  for(let i=1;i<COLS;i++) {
    ctx.beginPath(); ctx.moveTo(i*BLOCK,0); ctx.lineTo(i*BLOCK,canvas.height); ctx.stroke();
  }
  for(let i=1;i<ROWS;i++) {
    ctx.beginPath(); ctx.moveTo(0,i*BLOCK); ctx.lineTo(canvas.width,i*BLOCK); ctx.stroke();
  }

  board.forEach((row,y)=>{
    row.forEach((val,x)=>{
      if (val) drawBlock(ctx, x, y, colors[val]);
    });
  });
}

function drawPiece(piece, offsetX = 0, offsetY = 0, ctxToUse = ctx) {
  piece.matrix.forEach((row,y)=>{
    row.forEach((val,x)=>{
      if (val) {
        drawBlock(ctxToUse, piece.x + x + offsetX, piece.y + y + offsetY, colors[val]);
      }
    });
  });
}

function drawGhost() {
  if (!currentPiece) return;
  let ghostY = currentPiece.y;
  while (!collides(currentPiece.matrix, currentPiece.x, ghostY+1)) {
    ghostY++;
  }
  ctx.globalAlpha = 0.25;
  drawPiece(currentPiece, 0, ghostY - currentPiece.y);
  ctx.globalAlpha = 1;
}

function merge() {
  currentPiece.matrix.forEach((row,y)=>{
    row.forEach((val,x)=>{
      if (val) {
        board[currentPiece.y + y][currentPiece.x + x] = val;
      }
    });
  });
}

function collides(matrix, px, py) {
  for (let y = 0; y < matrix.length; y++) {
    for (let x = 0; x < matrix[y].length; x++) {
      if (matrix[y][x]) {
        let nx = px + x;
        let ny = py + y;
        if (nx < 0 || nx >= COLS || ny >= ROWS) return true;
        if (ny >= 0 && board[ny]?.[nx]) return true;
      }
    }
  }
  return false;
}

function rotate(matrix) {
  const n = matrix.length;
  const rotated = Array(n).fill().map(()=>Array(n).fill(0));
  for (let y = 0; y < n; y++) {
    for (let x = 0; x < n; x++) {
      rotated[x][n-1-y] = matrix[y][x];
    }
  }
  return rotated;
}

function playerRotate() {
  const oldMatrix = currentPiece.matrix;
  let newMatrix = rotate(oldMatrix);

  // wall kick – jednoduchý (zkusíme posunout o -2 až +2)
  for (let kick of [-2,-1,0,1,2]) {
    if (!collides(newMatrix, currentPiece.x + kick, currentPiece.y)) {
      currentPiece.matrix = newMatrix;
      currentPiece.x += kick;
      return;
    }
  }
  // nešlo otočit
}

function playerDrop() {
  if (!collides(currentPiece.matrix, currentPiece.x, currentPiece.y+1)) {
    currentPiece.y++;
    dropCounter = 0;
  } else {
    merge();
    clearLines();
    spawnPiece();
  }
}

function hardDrop() {
  while (!collides(currentPiece.matrix, currentPiece.x, currentPiece.y+1)) {
    currentPiece.y++;
    score += 2; // malý bonus za hard drop
  }
  playerDrop(); // uloží a spawn nový
}

function clearLines() {
  let rowsCleared = 0;
  outer: for (let y = ROWS-1; y >= 0; y--) {
    for (let x = 0; x < COLS; x++) {
      if (!board[y][x]) continue outer;
    }
    // řádek je plný → smažeme
    board.splice(y,1);
    board.unshift(Array(COLS).fill(0));
    rowsCleared++;
    y++; // znovu kontrolujeme stejný řádek (posunuli jsme dolů)
  }

  if (rowsCleared > 0) {
    const points = [0, 100, 300, 500, 800][rowsCleared] * level;
    score += points;
    lines += rowsCleared;

    if (lines >= level * 10) {
      level++;
      dropInterval = Math.max(100, 1000 - (level-1)*80);
    }

    // krátký bliknutí
    document.getElementById('score').style.color = '#ff0';
    setTimeout(()=>document.getElementById('score').style.color='#0ff', 200);
  }
}

function hold() {
  if (!canHold) return;
  canHold = false;

  if (!heldPiece) {
    // první hold → jen uložíme aktuální
    heldPiece = { ...currentPiece, x:0, y:0 };
    spawnPiece();
  } else {
    // vyměníme
    const temp = { ...currentPiece, x:0, y:0 };
    currentPiece = { ...heldPiece, x: COLS/2-2|0, y:0 };
    heldPiece = temp;
  }
  drawHold();
}

function spawnPiece() {
  if (!nextPiece) {
    nextPiece = createPiece(getRandomPiece());
  }
  currentPiece = nextPiece;
  nextPiece = createPiece(getRandomPiece());

  canHold = true;

  drawNext();
  drawHold();

  if (collides(currentPiece.matrix, currentPiece.x, currentPiece.y)) {
    gameOver = true;
    document.getElementById('message').style.opacity = 1;
  }
}

function drawNext() {
  nextCtx.fillStyle = '#000';
  nextCtx.fillRect(0,0,nextCanvas.width,nextCanvas.height);

  if (nextPiece) {
    const offsetX = nextPiece.type === 1 ? 0 : 1; // I je delší
    drawPiece(nextPiece, offsetX, 1, nextCtx);
  }
}

function drawHold() {
  holdCtx.fillStyle = '#000';
  holdCtx.fillRect(0,0,holdCanvas.width,holdCanvas.height);

  if (heldPiece) {
    const offsetX = heldPiece.type === 1 ? 0 : 1;
    drawPiece(heldPiece, offsetX, 1, holdCtx);
  }
}

function update(time = 0) {
  if (gameOver || paused) return requestAnimationFrame(update);

  const delta = time - lastTime;
  lastTime = time;
  dropCounter += delta;

  if (dropCounter > dropInterval) {
    playerDrop();
    dropCounter = 0;
  }

  drawBoard();
  if (currentPiece) {
    drawGhost();
    drawPiece(currentPiece);
  }

  document.getElementById('score').textContent = score;
  document.getElementById('level').textContent = level;
  document.getElementById('lines').textContent = lines;

  requestAnimationFrame(update);
}

// Ovládání
document.addEventListener('keydown', e => {
  if (gameOver) return;

  if (e.key === 'p' || e.key === 'P') {
    paused = !paused;
    document.getElementById('pause-overlay').style.opacity = paused ? 1 : 0;
    if (!paused) requestAnimationFrame(update);
    return;
  }

  if (paused) return;

  switch(e.key) {
    case 'ArrowLeft':  
      if (!collides(currentPiece.matrix, currentPiece.x-1, currentPiece.y)) currentPiece.x--; 
      break;
    case 'ArrowRight': 
      if (!collides(currentPiece.matrix, currentPiece.x+1, currentPiece.y)) currentPiece.x++; 
      break;
    case 'ArrowDown':  
      playerDrop(); 
      break;
    case 'ArrowUp':    
      playerRotate(); 
      break;
    case ' ':          
      e.preventDefault(); 
      hardDrop(); 
      break;
    case 'c':
    case 'C':          
      hold(); 
      break;
  }
});

// Start hry
spawnPiece();
update();
</script>
</body>
</html>
