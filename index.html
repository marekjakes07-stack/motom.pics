<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGE OF WAR - PŘESNÁ REPLIKA 🏹⚔️🔫💣🤖</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0a0c14;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial Black', 'Impact', sans-serif;
            padding: 10px;
        }

        #gameWrapper {
            width: 1200px;
            max-width: 100%;
            background: #1e1e2c;
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 20px 40px #000, inset 0 0 30px #4a3a6a;
            border: 4px solid #8a7a5a;
        }

        /* HLAVNÍ BATTLEFIELD */
        #battlefield {
            position: relative;
            width: 100%;
            height: 450px;
            background: linear-gradient(0deg, #3d6b3d 0%, #8bb56b 30%, #5a8ab5 100%);
            border: 5px solid #9b8b6b;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 15px;
            box-shadow: inset 0 -50px 30px #2d4a2d;
            cursor: crosshair;
        }

        /* ZÁKLADNY - PŘESNĚ JAKO VE FLASHI */
        .base {
            position: absolute;
            bottom: 0;
            width: 180px;
            height: 220px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: bottom center;
            filter: drop-shadow(0 0 10px #000);
            transition: all 0.2s;
            z-index: 15;
        }

        #playerBase {
            left: 10px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><rect x="40" y="120" width="120" height="60" fill="%234a6ea8" stroke="%23aac8ff" stroke-width="4"/><rect x="70" y="70" width="60" height="50" fill="%23628cda" stroke="%23ffffff"/><circle cx="100" cy="45" r="20" fill="%23ffdd55" stroke="%23ffffff"/><rect x="20" y="170" width="160" height="30" fill="%235a4a3a" stroke="%23ccb58b"/></svg>');
        }

        #enemyBase {
            right: 10px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><rect x="40" y="120" width="120" height="60" fill="%23b54a4a" stroke="%23ffaaaa" stroke-width="4"/><rect x="70" y="70" width="60" height="50" fill="%23d46a6a" stroke="%23ffffff"/><circle cx="100" cy="45" r="20" fill="%23aa2222" stroke="%23ffffff"/><rect x="20" y="170" width="160" height="30" fill="%235a4a3a" stroke="%23ccb58b"/></svg>');
        }

        /* VĚŽE NAD ZÁKLADNAMI - NOVINKA PROTI PŘEDCHOZÍ VERZI */
        .turret {
            position: absolute;
            width: 60px;
            height: 60px;
            background-size: contain;
            background-repeat: no-repeat;
            z-index: 20;
            filter: drop-shadow(0 0 5px gold);
        }

        #playerTurret {
            left: 70px;
            bottom: 180px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60"><circle cx="30" cy="30" r="25" fill="%234488ff"/><rect x="20" y="5" width="20" height="35" fill="%23cccccc"/><circle cx="30" cy="15" r="8" fill="%23ffaa00"/></svg>');
            display: none;
        }

        #enemyTurret {
            right: 70px;
            bottom: 180px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60"><circle cx="30" cy="30" r="25" fill="%23ff4444"/><rect x="20" y="5" width="20" height="35" fill="%23cccccc"/><circle cx="30" cy="15" r="8" fill="%23ffaa00"/></svg>');
            display: none;
        }

        /* HEALTH BARY ZÁKLADEN */
        .base-health-container {
            position: absolute;
            bottom: 200px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 20px;
            background: #2a1e0e;
            border: 3px solid #cba05a;
            border-radius: 15px;
            overflow: hidden;
            z-index: 25;
        }

        .base-health-fill {
            height: 100%;
            width: 100%;
            transition: width 0.1s linear;
        }

        #playerBaseHealthFill {
            background: linear-gradient(90deg, #2eff2e, #9eff9e);
        }

        #enemyBaseHealthFill {
            background: linear-gradient(90deg, #ff2e2e, #ff9e9e);
        }

        /* HEALTH BARY VĚŽÍ */
        .turret-health {
            position: absolute;
            top: -15px;
            left: 0;
            width: 60px;
            height: 8px;
            background: #000;
            border: 1px solid #fff;
            border-radius: 4px;
            overflow: hidden;
        }

        .turret-health-fill {
            height: 100%;
            background: #44ff44;
            transition: width 0.1s;
        }

        /* JEDNOTKY - 4 TYPY NA ÉRU */
        .unit {
            position: absolute;
            bottom: 15px;
            width: 45px;
            height: 55px;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            filter: drop-shadow(2px 2px 2px black);
            z-index: 10;
            transition: left 0.05s linear;
        }

        .unit.player-unit {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 50"><circle cx="20" cy="15" r="10" fill="%233388ff"/><rect x="12" y="25" width="16" height="20" fill="%231144aa"/><circle cx="20" cy="45" r="5" fill="%23ccaa88"/></svg>');
        }

        .unit.enemy-unit {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 50"><circle cx="20" cy="15" r="10" fill="%23ff4444"/><rect x="12" y="25" width="16" height="20" fill="%23aa2222"/><circle cx="20" cy="45" r="5" fill="%23ccaa88"/></svg>');
        }

        .unit-health-bar {
            position: absolute;
            top: -12px;
            left: 2px;
            width: 40px;
            height: 6px;
            background: #111;
            border: 1px solid #fff;
            border-radius: 3px;
        }

        .unit-health-fill {
            height: 100%;
            background: #4eff4e;
            transition: width 0.1s;
        }

        /* KONTROLNÍ PANEL */
        #controlPanel {
            background: #2a2a3a;
            border: 4px solid #9b8b6b;
            border-radius: 20px;
            padding: 15px;
            display: grid;
            grid-template-columns: 200px 1fr 200px;
            gap: 10px;
            color: white;
        }

        /* PANEL ÉRY */
        #eraPanel {
            background: #1a1a28;
            border: 3px solid #8a7a5a;
            border-radius: 15px;
            padding: 10px;
            text-align: center;
        }

        #eraName {
            font-size: 22px;
            font-weight: bold;
            color: #ffaa44;
            text-shadow: 0 0 10px #ffaa44;
            margin-bottom: 10px;
        }

        #xpBar {
            width: 100%;
            height: 25px;
            background: #222;
            border-radius: 15px;
            border: 2px solid #6a5a4a;
            overflow: hidden;
            margin: 10px 0;
        }

        #xpFill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #44aaff, #88ddff);
            transition: width 0.3s;
        }

        #turretBtn {
            background: #4a6a8a;
            border: 3px solid #aac8ff;
            color: white;
            font-size: 18px;
            padding: 10px;
            border-radius: 15px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
            transition: all 0.2s;
        }

        #turretBtn:hover:not(:disabled) {
            transform: scale(1.05);
            background: #5a7a9a;
        }

        #turretBtn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* JEDNOTKY - GRID */
        #unitsGrid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            background: #1e1e2c;
            padding: 10px;
            border-radius: 15px;
            border: 2px solid #6a5a4a;
        }

        .unit-card {
            background: #2a2a3a;
            border: 3px solid #6a6a8a;
            border-radius: 15px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.1s;
            font-size: 14px;
            box-shadow: 0 4px 0 #3a3a4a;
        }

        .unit-card:hover:not(.disabled) {
            transform: translateY(-2px);
            border-color: #ffaa44;
            box-shadow: 0 6px 0 #3a3a4a;
        }

        .unit-card:active:not(.disabled) {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #3a3a4a;
        }

        .unit-card.disabled {
            opacity: 0.4;
            cursor: not-allowed;
            filter: grayscale(0.8);
        }

        .unit-emoji {
            font-size: 32px;
        }

        .unit-name {
            font-weight: bold;
            color: #ffddaa;
        }

        .unit-cost {
            color: #ffaa44;
        }

        .unit-stats {
            font-size: 11px;
            color: #aaa;
        }

        /* PRAVÝ PANEL - INFO */
        #infoPanel {
            background: #1a1a28;
            border: 3px solid #8a7a5a;
            border-radius: 15px;
            padding: 10px;
            text-align: center;
        }

        #waveInfo {
            font-size: 24px;
            color: #ffaa44;
            margin: 10px 0;
        }

        #enemyWaveCount {
            font-size: 18px;
            color: #ff6666;
        }

        #restartBtn {
            background: #6a4a4a;
            border: 3px solid #ffaa88;
            color: white;
            font-size: 20px;
            padding: 12px;
            border-radius: 15px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            font-weight: bold;
            transition: all 0.2s;
        }

        #restartBtn:hover {
            background: #8a5a5a;
            transform: scale(1.02);
        }

        #gameStatus {
            text-align: center;
            font-size: 28px;
            margin-top: 15px;
            color: #ffaa44;
            text-shadow: 0 0 15px #ffaa44;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="gameWrapper">
        <!-- BATTLEFIELD S VĚŽEMI -->
        <div id="battlefield">
            <div id="playerBase" class="base">
                <div class="base-health-container">
                    <div id="playerBaseHealthFill" class="base-health-fill" style="width: 100%"></div>
                </div>
            </div>
            <div id="enemyBase" class="base">
                <div class="base-health-container">
                    <div id="enemyBaseHealthFill" class="base-health-fill" style="width: 100%"></div>
                </div>
            </div>
            
            <!-- VĚŽE (VIDITELNÉ AŽ PO KOUPI) -->
            <div id="playerTurret" class="turret">
                <div class="turret-health">
                    <div id="playerTurretHealthFill" class="turret-health-fill" style="width: 100%"></div>
                </div>
            </div>
            <div id="enemyTurret" class="turret">
                <div class="turret-health">
                    <div id="enemyTurretHealthFill" class="turret-health-fill" style="width: 100%"></div>
                </div>
            </div>
        </div>

        <!-- KONTROLNÍ PANEL -->
        <div id="controlPanel">
            <!-- LEVÝ PANEL - ÉRA A VĚŽ -->
            <div id="eraPanel">
                <div id="eraName">🏹 KAVENNÁ ÉRA</div>
                <div id="xpBar">
                    <div id="xpFill" style="width: 30%"></div>
                </div>
                <div id="xpDisplay">XP: 150 / 500</div>
                <div id="eraBonusDisplay">🔥 Bonus: +0%</div>
                <button id="turretBtn" disabled>🏗️ KOUPIT VĚŽ (500💰)</button>
            </div>

            <!-- STŘED - JEDNOTKY (4 NA ÉRU) -->
            <div id="unitsGrid"></div>

            <!-- PRAVÝ PANEL - INFO A VLNY -->
            <div id="infoPanel">
                <div id="waveInfo">🌊 VLNA 1</div>
                <div id="enemyWaveCount">Nepřátel ve vlně: 0</div>
                <div id="playerStats">
                    <div>⚔️ Poškození: <span id="playerDamageBonus">+0%</span></div>
                    <div>🛡️ Obrana věže: <span id="turretDefense">0</span></div>
                </div>
                <button id="restartBtn">🔄 RESTARTOVAT HRU</button>
            </div>
        </div>

        <!-- STATUS HRY -->
        <div id="gameStatus"></div>
    </div>

    <script>
        (function() {
            // === ABSOLUTNĚ PŘESNÝ AGE OF WAR REMASTER ===
            
            // 5 ÉR S BONUSY
            const ERAS = [
                { name: "🏹 KAVENNÁ ÉRA", bonus: 0, upgradeCost: 500, color: "#8b6b4b" },
                { name: "⚔️ STŘEDOVĚK", bonus: 30, upgradeCost: 1000, color: "#6b4b8b" },
                { name: "🔫 KOLONIÁLNÍ ÉRA", bonus: 70, upgradeCost: 2000, color: "#4b6b8b" },
                { name: "💣 MODERNÍ ÉRA", bonus: 120, upgradeCost: 4000, color: "#8b4b4b" },
                { name: "🤖 FUTURISTICKÁ ÉRA", bonus: 200, upgradeCost: 8000, color: "#4b8b4b" }
            ];

            // 4 JEDNOTKY NA ÉRU (CELKEM 20 JEDNOTEK - PŘESNĚ JAKO V ORIGINÁLE)
            const UNITS = [
                // KAVENNÁ ÉRA (0)
                { name: "Bojovník", cost: 50, damage: 8, hp: 50, era: 0, emoji: "🪓", speed: 1.0, range: 20 },
                { name: "Lukostřelec", cost: 80, damage: 15, hp: 30, era: 0, emoji: "🏹", speed: 0.9, range: 60 },
                { name: "Kopiník", cost: 65, damage: 12, hp: 45, era: 0, emoji: "🔱", speed: 0.8, range: 30 },
                { name: "Šaman", cost: 120, damage: 20, hp: 40, era: 0, emoji: "🔮", speed: 0.7, range: 50 },
                
                // STŘEDOVĚK (1)
                { name: "Rytíř", cost: 150, damage: 30, hp: 100, era: 1, emoji: "⚔️", speed: 0.8, range: 25 },
                { name: "Kuše", cost: 130, damage: 35, hp: 50, era: 1, emoji: "🎯", speed: 0.7, range: 80 },
                { name: "Halapartník", cost: 140, damage: 28, hp: 90, era: 1, emoji: "🔱", speed: 0.7, range: 30 },
                { name: "Mnich", cost: 200, damage: 45, hp: 70, era: 1, emoji: "⛪", speed: 0.6, range: 40 },
                
                // KOLONIÁLNÍ (2)
                { name: "Mušketýr", cost: 250, damage: 60, hp: 60, era: 2, emoji: "🔫", speed: 0.6, range: 100 },
                { name: "Granátník", cost: 300, damage: 90, hp: 50, era: 2, emoji: "💣", speed: 0.5, range: 70 },
                { name: "Dragoun", cost: 280, damage: 70, hp: 90, era: 2, emoji: "🐎", speed: 0.9, range: 30 },
                { name: "Kanonýr", cost: 350, damage: 120, hp: 40, era: 2, emoji: "🧨", speed: 0.4, range: 120 },
                
                // MODERNÍ (3)
                { name: "Samopalník", cost: 400, damage: 130, hp: 80, era: 3, emoji: "🔫", speed: 0.7, range: 90 },
                { name: "Bazukista", cost: 500, damage: 200, hp: 60, era: 3, emoji: "🚀", speed: 0.5, range: 110 },
                { name: "Kulometčík", cost: 450, damage: 180, hp: 70, era: 3, emoji: "⚙️", speed: 0.4, range: 130 },
                { name: "Polní lékař", cost: 350, damage: 40, hp: 100, era: 3, emoji: "💉", speed: 0.8, range: 40 },
                
                // FUTURISTICKÁ (4)
                { name: "Laserový voják", cost: 700, damage: 300, hp: 120, era: 4, emoji: "⚡", speed: 0.8, range: 100 },
                { name: "Mech", cost: 1000, damage: 500, hp: 300, era: 4, emoji: "🤖", speed: 0.5, range: 80 },
                { name: "Tryskáč", cost: 850, damage: 400, hp: 150, era: 4, emoji: "🚀", speed: 1.2, range: 90 },
                { name: "Destroyer", cost: 1500, damage: 800, hp: 200, era: 4, emoji: "👾", speed: 0.6, range: 120 }
            ];

            // === HERNÍ STAV ===
            let playerBaseHP = 2000;
            let playerBaseMaxHP = 2000;
            let enemyBaseHP = 2000;
            let enemyBaseMaxHP = 2000;

            // VĚŽE
            let playerTurret = { active: false, hp: 500, maxHp: 500, damage: 50, level: 1 };
            let enemyTurret = { active: false, hp: 500, maxHp: 500, damage: 50, level: 1 };

            let currentEra = 0;
            let xp = 150;
            let xpToNextEra = 500;

            let playerUnits = [];
            let enemyUnits = [];

            let waveNumber = 1;
            let enemiesThisWave = 5;
            let waveTimer = 0;

            let gameRunning = true;
            let gameOver = false;
            let gameWin = false;

            // === DOM ELEMENTY ===
            const battlefield = document.getElementById('battlefield');
            const playerBaseFill = document.getElementById('playerBaseHealthFill');
            const enemyBaseFill = document.getElementById('enemyBaseHealthFill');
            const playerTurretEl = document.getElementById('playerTurret');
            const enemyTurretEl = document.getElementById('enemyTurret');
            const playerTurretHealthFill = document.getElementById('playerTurretHealthFill');
            const enemyTurretHealthFill = document.getElementById('enemyTurretHealthFill');
            
            const eraNameEl = document.getElementById('eraName');
            const xpFill = document.getElementById('xpFill');
            const xpDisplay = document.getElementById('xpDisplay');
            const eraBonusDisplay = document.getElementById('eraBonusDisplay');
            const turretBtn = document.getElementById('turretBtn');
            const unitsGrid = document.getElementById('unitsGrid');
            const waveInfo = document.getElementById('waveInfo');
            const enemyWaveCount = document.getElementById('enemyWaveCount');
            const playerDamageBonus = document.getElementById('playerDamageBonus');
            const turretDefense = document.getElementById('turretDefense');
            const gameStatus = document.getElementById('gameStatus');
            const restartBtn = document.getElementById('restartBtn');

            // === FUNKCE PRO UPDATE UI ===
            function updateUI() {
                // Základny HP
                playerBaseFill.style.width = (playerBaseHP / playerBaseMaxHP * 100) + '%';
                enemyBaseFill.style.width = (enemyBaseHP / enemyBaseMaxHP * 100) + '%';

                // Věže
                if (playerTurret.active) {
                    playerTurretEl.style.display = 'block';
                    playerTurretHealthFill.style.width = (playerTurret.hp / playerTurret.maxHp * 100) + '%';
                } else {
                    playerTurretEl.style.display = 'none';
                }

                if (enemyTurret.active) {
                    enemyTurretEl.style.display = 'block';
                    enemyTurretHealthFill.style.width = (enemyTurret.hp / enemyTurret.maxHp * 100) + '%';
                } else {
                    enemyTurretEl.style.display = 'none';
                }

                // Éra a XP
                eraNameEl.textContent = ERAS[currentEra].name;
                const xpPercent = (xp / xpToNextEra * 100);
                xpFill.style.width = Math.min(100, xpPercent) + '%';
                xpDisplay.textContent = `XP: ${xp} / ${xpToNextEra}`;
                eraBonusDisplay.textContent = `🔥 Bonus: +${ERAS[currentEra].bonus}%`;

                // Wave info
                waveInfo.textContent = `🌊 VLNA ${waveNumber}`;
                enemyWaveCount.textContent = `Nepřátel: ${enemyUnits.length}`;

                // Bonusy
                playerDamageBonus.textContent = `+${ERAS[currentEra].bonus}%`;
                turretDefense.textContent = playerTurret.active ? playerTurret.level : 0;

                // Stav hry
                if (playerBaseHP <= 0) {
                    gameStatus.textContent = '💀 PROHRA - ZÁKLADNA ZNIČENA 💀';
                    gameRunning = false;
                } else if (enemyBaseHP <= 0) {
                    gameStatus.textContent = '🏆 VÍTĚZSTVÍ - NEPŘÍTEL PADL 🏆';
                    gameRunning = false;
                } else {
                    gameStatus.textContent = '⚔️ BOJ PROBÍHÁ ⚔️';
                }

                // Tlačítko věže
                turretBtn.disabled = playerTurret.active || xp < 500;
                turretBtn.textContent = playerTurret.active ? '✅ VĚŽ AKTIVNÍ' : '🏗️ KOUPIT VĚŽ (500💰)';

                renderUnits();
                renderUnitCards();
            }

            // VYKRESLENÍ JEDNOTEK
            function renderUnits() {
                document.querySelectorAll('.unit').forEach(u => u.remove());

                // Hráčovy jednotky
                playerUnits.forEach((unit, index) => {
                    const unitEl = document.createElement('div');
                    unitEl.className = 'unit player-unit';
                    unitEl.style.left = (30 + (index * 25) % 250) + 'px';
                    
                    const healthBar = document.createElement('div');
                    healthBar.className = 'unit-health-bar';
                    const healthFill = document.createElement('div');
                    healthFill.className = 'unit-health-fill';
                    healthFill.style.width = (unit.hp / unit.maxHp * 100) + '%';
                    healthBar.appendChild(healthFill);
                    unitEl.appendChild(healthBar);

                    battlefield.appendChild(unitEl);
                });

                // Nepřátelské jednotky
                enemyUnits.forEach((unit, index) => {
                    const unitEl = document.createElement('div');
                    unitEl.className = 'unit enemy-unit';
                    unitEl.style.right = (30 + (index * 25) % 250) + 'px';
                    
                    const healthBar = document.createElement('div');
                    healthBar.className = 'unit-health-bar';
                    const healthFill = document.createElement('div');
                    healthFill.className = 'unit-health-fill';
                    healthFill.style.width = (unit.hp / unit.maxHp * 100) + '%';
                    healthBar.appendChild(healthFill);
                    unitEl.appendChild(healthBar);

                    battlefield.appendChild(unitEl);
                });
            }

            // KARTY JEDNOTEK (4 NA ÉRU)
            function renderUnitCards() {
                unitsGrid.innerHTML = '';
                
                const eraUnits = UNITS.filter(u => u.era <= currentEra);
                eraUnits.forEach(unit => {
                    const card = document.createElement('div');
                    card.className = 'unit-card';
                    
                    const hasEnoughXP = xp >= unit.cost;
                    if (!hasEnoughXP) card.classList.add('disabled');

                    card.innerHTML = `
                        <div class="unit-emoji">${unit.emoji}</div>
                        <div class="unit-name">${unit.name}</div>
                        <div class="unit-cost">💰 ${unit.cost}</div>
                        <div class="unit-stats">⚔️ ${Math.floor(unit.damage * (1 + ERAS[currentEra].bonus/100))} | ❤️ ${unit.hp}</div>
                    `;

                    card.addEventListener('click', () => {
                        if (hasEnoughXP && gameRunning && playerBaseHP > 0 && enemyBaseHP > 0) {
                            spawnUnit(unit);
                        }
                    });

                    unitsGrid.appendChild(card);
                });

                // KARTA PRO UPGRADE ÉRY
                if (currentEra < ERAS.length - 1) {
                    const upgradeCard = document.createElement('div');
                    upgradeCard.className = 'unit-card era-upgrade';
                    const upgradeCost = ERAS[currentEra].upgradeCost;
                    
                    upgradeCard.innerHTML = `
                        <div class="unit-emoji">⬆️</div>
                        <div class="unit-name">NOVÁ ÉRA</div>
                        <div class="unit-cost">💰 ${upgradeCost}</div>
                        <div class="unit-stats">➡️ ${ERAS[currentEra+1].name}</div>
                    `;

                    upgradeCard.addEventListener('click', () => {
                        if (xp >= upgradeCost && gameRunning && currentEra < ERAS.length - 1) {
                            xp -= upgradeCost;
                            currentEra++;
                            updateUI();
                        }
                    });

                    unitsGrid.appendChild(upgradeCard);
                }
            }

            // SPAWN JEDNOTKY
            function spawnUnit(unitTemplate) {
                if (xp < unitTemplate.cost) return;
                
                xp -= unitTemplate.cost;
                
                const bonus = ERAS[currentEra].bonus / 100;
                const newUnit = {
                    ...unitTemplate,
                    maxHp: unitTemplate.hp,
                    hp: unitTemplate.hp,
                    damage: unitTemplate.damage * (1 + bonus),
                    currentCooldown: 0,
                    x: 50,
                    type: 'player'
                };
                
                playerUnits.push(newUnit);
                updateUI();
            }

            // KOUPĚ VĚŽE
            turretBtn.addEventListener('click', () => {
                if (xp >= 500 && !playerTurret.active) {
                    xp -= 500;
                    playerTurret.active = true;
                    playerTurret.hp = 500;
                    playerTurret.maxHp = 500;
                    updateUI();
                }
            });

            // AI NEPŘÍTELE - SPAWNOVÁNÍ VLN
            function enemyAI() {
                if (!gameRunning) return;

                // Spawn nové vlny
                if (enemyUnits.length === 0 && waveTimer <= 0) {
                    waveNumber++;
                    enemiesThisWave = 5 + waveNumber * 2;
                    
                    // Urči éru nepřítele
                    const enemyEra = Math.min(currentEra, Math.floor(waveNumber / 3));
                    const availableUnits = UNITS.filter(u => u.era <= enemyEra);
                    
                    for (let i = 0; i < enemiesThisWave; i++) {
                        if (availableUnits.length > 0) {
                            const unit = availableUnits[Math.floor(Math.random() * availableUnits.length)];
                            const bonus = ERAS[enemyEra].bonus / 100;
                            
                            enemyUnits.push({
                                ...unit,
                                maxHp: unit.hp,
                                hp: unit.hp,
                                damage: unit.damage * (1 + bonus),
                                currentCooldown: 0,
                                type: 'enemy'
                            });
                        }
                    }
                    
                    waveTimer = 100; // Pauza mezi vlnami
                } else {
                    waveTimer--;
                }
            }

            // BOJOVÝ SYSTÉM
            function combatTick() {
                if (!gameRunning) return;

                // Věž střílí
                if (playerTurret.active && enemyUnits.length > 0) {
                    const target = enemyUnits[0];
                    target.hp -= playerTurret.damage;
                    xp += 5;
                    
                    if (target.hp <= 0) {
                        enemyUnits.shift();
                        xp += 30;
                    }
                }

                if (enemyTurret.active && playerUnits.length > 0) {
                    const target = playerUnits[0];
                    target.hp -= enemyTurret.damage;
                    
                    if (target.hp <= 0) {
                        playerUnits.shift();
                    }
                }

                // Souboje jednotek
                for (let i = playerUnits.length - 1; i >= 0; i--) {
                    const pUnit = playerUnits[i];
                    
                    if (enemyUnits.length > 0) {
                        const target = enemyUnits[0];
                        target.hp -= pUnit.damage;
                        xp += Math.floor(pUnit.damage / 5);
                        
                        if (target.hp <= 0) {
                            enemyUnits.shift();
                            xp += 25;
                        }
                    } else {
                        enemyBaseHP -= pUnit.damage / 2;
                        xp += Math.floor(pUnit.damage / 8);
                    }
                }

                for (let i = enemyUnits.length - 1; i >= 0; i--) {
                    const eUnit = enemyUnits[i];
                    
                    if (playerUnits.length > 0) {
                        const target = playerUnits[0];
                        target.hp -= eUnit.damage;
                        
                        if (target.hp <= 0) {
                            playerUnits.shift();
                        }
                    } else {
                        playerBaseHP -= eUnit.damage / 2;
                        
                        if (playerBaseHP <= 0) {
                            playerBaseHP = 0;
                            gameRunning = false;
                        }
                    }
                }

                // XP limit
                if (xp > xpToNextEra * 2) xp = xpToNextEra * 2;
                
                updateUI();
            }
