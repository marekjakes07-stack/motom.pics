<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>✨ GALAKTICKÉ PÁROVÁNÍ ✨ - paměťová hra</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(ellipse at 30% 40%, #0a0f2a, #03050c);
            font-family: 'Segoe UI', 'Poppins', 'Orbitron', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-wrapper {
            background: rgba(10, 20, 40, 0.55);
            backdrop-filter: blur(8px);
            border-radius: 64px;
            padding: 24px 28px 32px 28px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.3);
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }

        .stats-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
            background: #03061ad9;
            padding: 12px 28px;
            border-radius: 80px;
            backdrop-filter: blur(4px);
            width: 100%;
            border: 1px solid cyan;
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.3);
        }

        .stat-card {
            display: flex;
            align-items: baseline;
            gap: 10px;
            font-weight: bold;
            background: #00000066;
            padding: 6px 20px;
            border-radius: 40px;
            font-family: 'Orbitron', monospace;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #9bd7ff;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 1.9rem;
            font-weight: 800;
            color: #ffd966;
            text-shadow: 0 0 6px #ffaa33;
            line-height: 1;
        }

        .timer-critical {
            color: #ff6666;
            text-shadow: 0 0 8px red;
            animation: pulse 0.8s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.8; text-shadow: 0 0 2px red; }
            100% { opacity: 1; text-shadow: 0 0 12px #ff4444; }
        }

        .board {
            display: grid;
            grid-template-columns: repeat(4, minmax(85px, 110px));
            gap: 16px;
            justify-content: center;
            margin: 15px 0;
            padding: 8px;
        }

        .card {
            aspect-ratio: 1 / 1;
            background: linear-gradient(145deg, #1e2a4a, #0e1a2e);
            border-radius: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 12px 18px -6px black, inset 0 1px 0 rgba(255,255,255,0.2);
            border: 1px solid rgba(0, 255, 255, 0.4);
            transform: scale(1);
        }

        .card.flipped, .card.matched {
            background: linear-gradient(145deg, #f9e0a0, #ffc978);
            box-shadow: 0 0 18px rgba(255, 215, 0, 0.7);
            border-color: #ffd966;
            transform: scale(0.98);
        }

        .card.matched {
            background: linear-gradient(145deg, #6b8c5c, #4c6a3b);
            box-shadow: 0 0 12px #8bc34a;
            filter: brightness(0.95);
            cursor: default;
            opacity: 0.7;
        }

        .card:active:not(.matched) {
            transform: scale(0.96);
        }

        .card-content {
            transition: all 0.1s;
        }

        .btn-reset {
            background: linear-gradient(95deg, #ff416c, #ff4b2b);
            border: none;
            font-family: 'Orbitron', monospace;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 12px 32px;
            border-radius: 60px;
            color: white;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 0 #9b2a1a;
            margin-top: 10px;
        }

        .btn-reset:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #9b2a1a;
        }

        .message-area {
            font-size: 1rem;
            background: #00000099;
            padding: 8px 18px;
            border-radius: 50px;
            color: #c0e0ff;
            font-weight: bold;
            backdrop-filter: blur(5px);
            text-align: center;
        }

        .combo-indicator {
            background: #ffaa33cc;
            color: #2a1e00;
            padding: 4px 16px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1rem;
            animation: bounce 0.4s ease;
        }

        @keyframes bounce {
            0% { transform: scale(0.8); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        h1 {
            margin: 0 0 5px 0;
            font-size: 1.7rem;
            text-align: center;
            background: linear-gradient(135deg, #ffe6b0, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 2px;
        }

        @media (max-width: 550px) {
            .board {
                grid-template-columns: repeat(4, minmax(70px, 85px));
                gap: 12px;
            }
            .card {
                font-size: 2.4rem;
            }
            .stat-value {
                font-size: 1.4rem;
            }
            .stats-panel {
                gap: 12px;
            }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-container">
        <h1>🌀 GALAKTICKÉ PÁROVÁNÍ 🪐</h1>
        <div class="stats-panel">
            <div class="stat-card"><span class="stat-label">⭐ SKÓRE</span><span class="stat-value" id="scoreDisplay">0</span></div>
            <div class="stat-card"><span class="stat-label">🔥 KOMBO</span><span class="stat-value" id="comboDisplay">0</span></div>
            <div class="stat-card"><span class="stat-label">⏱️ ČAS</span><span class="stat-value" id="timerDisplay">00:00</span></div>
            <div class="stat-card"><span class="stat-label">🎯 POŠKOZENÍ</span><span class="stat-value" id="pairsMatched">0</span><span class="stat-label">/8</span></div>
        </div>
        <div class="board" id="gameBoard"></div>
        <button class="btn-reset" id="resetGameBtn">🔄 NOVÁ HRA / RESTART</button>
        <div class="message-area" id="statusMsg">✨ Najdi dvojice! ✨</div>
    </div>
</div>

<script>
    (function(){
        // ---------- KONFIGURACE HRY ----------
        const BOARD_SIZE = 4;      // 4x4 = 16 karet = 8 párů
        const TOTAL_PAIRS = 8;
        
        // Seznam emotikon / vesmírných symbolů (8 párů)
        const ICONS = [
            "🚀", "🛸", "🌕", "🌌", "⭐", "☄️", "🪐", "👽",
            "🚀", "🛸", "🌕", "🌌", "⭐", "☄️", "🪐", "👽"
        ];
        
        // Herní proměnné
        let cards = [];            // { id, icon, isFlipped, isMatched, element, index }
        let cardElements = [];
        let lockBoard = false;
        let firstCard = null;
        let secondCard = null;
        let currentScore = 0;
        let currentCombo = 0;
        let matchedPairs = 0;
        let timeLeft = 75;         // 75 sekund na hru
        let timerInterval = null;
        let gameActive = true;
        
        // Efekty
        let floatingMsgTimeout = null;
        
        // DOM elementy
        const boardContainer = document.getElementById('gameBoard');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const comboDisplay = document.getElementById('comboDisplay');
        const timerDisplay = document.getElementById('timerDisplay');
        const pairsMatchedSpan = document.getElementById('pairsMatched');
        const statusMsgDiv = document.getElementById('statusMsg');
        
        // ---------- POMOCNÉ FUNKCE ----------
        function formatTime(seconds) {
            let mins = Math.floor(seconds / 60);
            let secs = seconds % 60;
            return `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        }
        
        function updateUI() {
            scoreDisplay.innerText = currentScore;
            comboDisplay.innerText = currentCombo;
            pairsMatchedSpan.innerText = matchedPairs;
            timerDisplay.innerText = formatTime(timeLeft);
            if(timeLeft <= 10) {
                timerDisplay.classList.add('timer-critical');
            } else {
                timerDisplay.classList.remove('timer-critical');
            }
        }
        
        // Zobraz zprávu s možným combo bonusem
        function setStatusMessage(msg, isError = false) {
            statusMsgDiv.innerHTML = msg;
            statusMsgDiv.style.color = isError ? "#ffaa99" : "#c0e0ff";
            if(floatingMsgTimeout) clearTimeout(floatingMsgTimeout);
            floatingMsgTimeout = setTimeout(() => {
                if(gameActive) statusMsgDiv.innerHTML = "✨ Hledej dvojice a buduj KOMBO! ✨";
                else statusMsgDiv.innerHTML = "💀 HRA SKONČILA 💀 Klikni na NOVÁ HRA";
            }, 2000);
        }
        
        // Aktualizace skóre a comba
        function addScore(basePoints) {
            if(!gameActive) return;
            let comboBonus = Math.floor(currentCombo * 12);
            let totalGain = basePoints + comboBonus;
            currentScore += totalGain;
            // combo se zvyšuje při správném páru
            currentCombo++;
            updateUI();
            // vizuální efekt combo
            const comboEl = document.getElementById('comboDisplay');
            comboEl.style.transform = 'scale(1.2)';
            setTimeout(() => { if(comboEl) comboEl.style.transform = ''; }, 200);
            setStatusMessage(`🎉 +${totalGain} bodů! (základ ${basePoints} + combo x${currentCombo-1}) 🎉`);
            return totalGain;
        }
        
        function resetCombo() {
            if(currentCombo > 2) {
                setStatusMessage(`💔 KOMBO PŘERUŠENO! Ztratil jsi ${currentCombo}x násobič...`, true);
            }
            currentCombo = 0;
            updateUI();
        }
        
        function gameOver(win = false) {
            if(!gameActive) return;
            gameActive = false;
            if(timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            lockBoard = true;  // zamknout další klikání
            if(win && matchedPairs === TOTAL_PAIRS) {
                setStatusMessage(`🏆 VÍTĚZSTVÍ! Skóre: ${currentScore} 🏆 Gratulace! 🎉`);
                statusMsgDiv.style.color = "#ffd966";
                // ohňostrojová zpráva
                confettiEffect();
            } else {
                setStatusMessage(`⏰ ČAS VYPRŠEL! Konečné skóre: ${currentScore} ⏰`, true);
            }
        }
        
        // jednoduchý confetti efekt (canvas)
        function confettiEffect() {
            const canvasConf = document.createElement('canvas');
            canvasConf.style.position = 'fixed';
            canvasConf.style.top = '0';
            canvasConf.style.left = '0';
            canvasConf.style.width = '100%';
            canvasConf.style.height = '100%';
            canvasConf.style.pointerEvents = 'none';
            canvasConf.style.zIndex = '9999';
            document.body.appendChild(canvasConf);
            const myConfetti = new ConfettiGenerator({ target: canvasConf, max: 150, size: 1.2, animate: true, props: ['circle', 'square'], colors: [[255,215,0],[100,200,255],[255,100,100]] });
            myConfetti.render();
            setTimeout(() => {
                document.body.removeChild(canvasConf);
            }, 2800);
        }
        
        // Zkontrolovat výhru
        function checkWin() {
            if(matchedPairs === TOTAL_PAIRS && gameActive) {
                gameOver(true);
            }
        }
        
        // Odkrytí karty (hlavní logika)
        function flipCard(cardObj, cardElement) {
            if(!gameActive) return;
            if(lockBoard) return;
            if(cardObj.isMatched) return;
            if(cardObj.isFlipped) return;
            if(secondCard !== null) return; // čekáme na reset
        
            // otočení karty
            cardObj.isFlipped = true;
            updateCardDisplay(cardObj, cardElement);
            
            if(firstCard === null) {
                // první karta
                firstCard = { obj: cardObj, el: cardElement };
            } else {
                // druhá karta – zkontrolujeme pár
                secondCard = { obj: cardObj, el: cardElement };
                lockBoard = true;
                checkMatch();
            }
        }
        
        function checkMatch() {
            const card1 = firstCard.obj;
            const card2 = secondCard.obj;
            const isMatch = (card1.icon === card2.icon);
            
            if(isMatch) {
                // ÚSPĚCH
                card1.isMatched = true;
                card2.isMatched = true;
                card1.isFlipped = true;
                card2.isFlipped = true;
                updateCardDisplay(card1, firstCard.el);
                updateCardDisplay(card2, secondCard.el);
                matchedPairs++;
                updateUI();
                
                // Přidání skóre: základ 100 + časový bonus (čím dřív, tím víc)
                let timeBonus = Math.floor(Math.max(5, timeLeft) * 1.5);
                let basePoints = 100 + timeBonus;
                addScore(basePoints);
                
                // Vizuální radost
                createSparkle(firstCard.el);
                createSparkle(secondCard.el);
                
                // Kontrola výhry
                checkWin();
                
                // resetování výběru a odemčení
                resetBoardState();
            } else {
                // CHYBA – reset comba a po krátké době skrytí
                resetCombo();
                setStatusMessage(`❌ ŠPATNÁ DVOJICE! (${card1.icon} ≠ ${card2.icon})`, true);
                // zobrazení karet na 0.8s a pak skrytí
                setTimeout(() => {
                    if(!gameActive) return;
                    if(card1 && !card1.isMatched) {
                        card1.isFlipped = false;
                        updateCardDisplay(card1, firstCard.el);
                    }
                    if(card2 && !card2.isMatched) {
                        card2.isFlipped = false;
                        updateCardDisplay(card2, secondCard.el);
                    }
                    resetBoardState();
                }, 800);
            }
        }
        
        function resetBoardState() {
            firstCard = null;
            secondCard = null;
            lockBoard = false;
        }
        
        // Vizuální aktualizace karty
        function updateCardDisplay(card, element) {
            const contentSpan = element.querySelector('.card-content');
            if(card.isMatched) {
                element.classList.add('matched');
                element.classList.add('flipped');
                contentSpan.innerHTML = card.icon;
                contentSpan.style.opacity = '0.8';
                element.style.cursor = 'default';
            } else if(card.isFlipped) {
                element.classList.add('flipped');
                element.classList.remove('matched');
                contentSpan.innerHTML = card.icon;
                contentSpan.style.opacity = '1';
            } else {
                element.classList.remove('flipped', 'matched');
                contentSpan.innerHTML = "❓";
                contentSpan.style.opacity = '1';
                element.style.cursor = 'pointer';
            }
        }
        
        function createSparkle(element) {
            element.style.transform = 'scale(0.98)';
            setTimeout(() => { if(element) element.style.transform = ''; }, 150);
            // jiskření
            const rect = element.getBoundingClientRect();
            for(let i=0;i<6;i++) {
                let spark = document.createElement('div');
                spark.innerHTML = '✨';
                spark.style.position = 'fixed';
                spark.style.left = rect.left + rect.width/2 + (Math.random() - 0.5)*40 + 'px';
                spark.style.top = rect.top + rect.height/2 + (Math.random() - 0.5)*40 + 'px';
                spark.style.fontSize = '20px';
                spark.style.pointerEvents = 'none';
                spark.style.zIndex = '9999';
                spark.style.opacity = '1';
                spark.style.transition = 'all 0.5s ease-out';
                document.body.appendChild(spark);
                setTimeout(() => {
                    spark.style.opacity = '0';
                    spark.style.transform = 'translateY(-30px)';
                    setTimeout(() => spark.remove(), 500);
                }, 20);
            }
        }
        
        // ---------- ČASOVAČ ----------
        function startTimer() {
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if(!gameActive) return;
                if(timeLeft <= 1) {
                    // konec hry - čas vypršel
                    if(gameActive) {
                        clearInterval(timerInterval);
                        timerInterval = null;
                        gameOver(false);
                    }
                } else {
                    timeLeft--;
                    updateUI();
                    if(timeLeft === 10) {
                        setStatusMessage("⚠️ POSLEDNÍCH 10 SEKUND! ⚠️", true);
                    }
                }
            }, 1000);
        }
        
        // ---------- GENEROVÁNÍ HRACÍHO POLE ----------
        function shuffleArray(arr) {
            for(let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        
        function initGameBoard() {
            // Zamíchat ikony
            const shuffledIcons = shuffleArray([...ICONS]);
            cards = [];
            for(let i=0; i<shuffledIcons.length; i++) {
                cards.push({
                    id: i,
                    icon: shuffledIcons[i],
                    isFlipped: false,
                    isMatched: false,
                });
            }
            // Vykreslení DOM
            boardContainer.innerHTML = '';
            cardElements = [];
            cards.forEach((card, idx) => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card';
                const contentSpan = document.createElement('div');
                contentSpan.className = 'card-content';
                contentSpan.innerHTML = "❓";
                cardDiv.appendChild(contentSpan);
                cardDiv.addEventListener('click', (e) => {
                    e.stopPropagation();
                    flipCard(card, cardDiv);
                });
                boardContainer.appendChild(cardDiv);
                cardElements.push(cardDiv);
                updateCardDisplay(card, cardDiv);
            });
        }
        
        // ---------- RESET HRY (plný restart) ----------
        function fullReset() {
            // zastavit časovač
            if(timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            // reset proměnných
            gameActive = true;
            lockBoard = false;
            firstCard = null;
            secondCard = null;
            currentScore = 0;
            currentCombo = 0;
            matchedPairs = 0;
            timeLeft = 75;
            // obnovit board
            initGameBoard();
            updateUI();
            setStatusMessage("🚀 Nová hra! Najdi všech 8 párů, buduj KOMBO! 🚀");
            // spustit časovač znovu
            startTimer();
            // odstranit všechny třídy timer-critical
            timerDisplay.classList.remove('timer-critical');
        }
        
        // ---------- NAČÍTACÍ SCRIPT + confetti knihovna (lehká inline) ----------
        // Jednoduchý ConfettiGenerator (minifikovaná verze pro radost)
        function ConfettiGenerator(params) {
            let target = params.target;
            let max = params.max || 100;
            let size = params.size || 1;
            let animate = params.animate !== false;
            let colors = params.colors || [[165,104,246],[230,61,135],[0,199,228],[253,214,126]];
            let props = params.props || ['circle','square'];
            let context = target.getContext('2d');
            let width = window.innerWidth;
            let height = window.innerHeight;
            let particles = [];
            let animationId = null;
            target.width = width;
            target.height = height;
            
            function random(min,max){ return Math.random()*(max-min)+min; }
            function init(){
                for(let i=0;i<max;i++){
                    let color = colors[Math.floor(Math.random()*colors.length)];
                    let prop = props[Math.floor(Math.random()*props.length)];
                    particles.push({
                        x: random(0,width), y: random(0,height),
                        size: random(0.5,size*2), speedY: random(2,8), speedX: random(-2,2),
                        color: `rgb(${color[0]},${color[1]},${color[2]})`, shape: prop, rotation: random(0,360)
                    });
                }
                animateConfetti();
            }
            function draw(){
                context.clearRect(0,0,width,height);
                for(let p of particles){
                    context.save();
                    context.translate(p.x,p.y);
                    context.rotate(p.rotation*Math.PI/180);
                    context.fillStyle = p.color;
                    if(p.shape === 'circle'){
                        context.beginPath();
                        context.arc(0,0,p.size,0,Math.PI*2);
                        context.fill();
                    } else {
                        context.fillRect(-p.size/2,-p.size/2,p.size,p.size);
                    }
                    context.restore();
                    p.y += p.speedY;
                    p.x += p.speedX;
                    p.rotation += 5;
                    if(p.y > height+30){ p.y = -20; p.x = random(0,width); }
                    if(p.x > width+30) p.x = -30;
                    if(p.x < -30) p.x = width+30;
                }
                if(animate) animationId = requestAnimationFrame(draw);
            }
            function animateConfetti(){ draw(); }
            this.render = function(){ init(); };
            this.clear = function(){ if(animationId) cancelAnimationFrame(animationId); context.clearRect(0,0,width,height); };
        }
        
        // Spuštění hry
        function startGame() {
            fullReset();
        }
        
        // Event listener pro tlačítko
        document.getElementById('resetGameBtn').addEventListener('click', () => {
            if(timerInterval) clearInterval(timerInterval);
            fullReset();
        });
        
        startGame();
    })();
</script>
</body>
</html>
