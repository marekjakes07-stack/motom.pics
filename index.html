<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>💣 MINESWEEPER • BEZPEČNÝ START • VESMÍRNÝ SAPIÉR 💣</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(ellipse at 30% 20%, #0b1120, #03050b);
            font-family: 'Segoe UI', 'Orbitron', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: rgba(5, 12, 25, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 56px;
            padding: 22px 28px 32px 28px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6), inset 0 1px 1px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.4);
            transition: all 0.2s;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            background: #01051ce0;
            padding: 12px 24px;
            border-radius: 80px;
            border: 1px solid #2affb6;
            box-shadow: 0 0 8px cyan;
        }

        .stats {
            display: flex;
            gap: 28px;
            background: #000000aa;
            padding: 6px 20px;
            border-radius: 50px;
        }

        .stat-item {
            display: flex;
            align-items: baseline;
            gap: 8px;
            font-weight: bold;
            font-family: monospace;
            font-size: 1.4rem;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #8dd0ff;
            letter-spacing: 1px;
        }

        .stat-value {
            color: #f5b642;
            text-shadow: 0 0 5px #ffaa33;
            font-size: 1.9rem;
            font-weight: 800;
            min-width: 55px;
            text-align: center;
        }

        .difficulty-selector {
            display: flex;
            gap: 12px;
            background: #0b1428;
            padding: 6px 16px;
            border-radius: 50px;
        }

        .diff-btn {
            background: #1e2a3a;
            border: none;
            font-family: inherit;
            font-weight: bold;
            padding: 6px 16px;
            border-radius: 40px;
            color: #bbd9ff;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        .diff-btn.active {
            background: linear-gradient(135deg, #ffaa33, #ff7e05);
            color: #1a0f00;
            box-shadow: 0 0 12px orange;
            text-shadow: none;
        }

        .reset-btn {
            background: linear-gradient(135deg, #3a86ff, #8338ec);
            border: none;
            font-family: inherit;
            font-weight: bold;
            padding: 6px 28px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.2s;
            box-shadow: 0 3px 0 #1f2a5a;
        }

        .reset-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #1f2a5a;
        }

        .board {
            display: grid;
            justify-content: center;
            gap: 3px;
            background: #071126;
            padding: 12px;
            border-radius: 32px;
            box-shadow: inset 0 0 10px #00000055, 0 8px 20px black;
            margin: 10px 0;
        }

        .cell {
            aspect-ratio: 1 / 1;
            background: #1f2b3c;
            background-image: radial-gradient(circle at 35% 30%, #2f3e55, #121e2c);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.3rem;
            font-family: monospace;
            cursor: pointer;
            transition: 0.05s linear;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.2), 0 2px 4px black;
            color: #ffd966;
        }

        .cell.revealed {
            background: #cbd5e6;
            background: linear-gradient(145deg, #cbdae9, #b0c0d4);
            box-shadow: inset 0 0 0 1px #ffffdd, 0 1px 2px rgba(0,0,0,0.2);
            color: #1e293b;
        }

        .cell.flagged::before {
            content: "🚩";
            font-size: 1.3rem;
            display: block;
            line-height: 1;
        }

        .cell.revealed.flagged::before {
            content: "";
        }

        .cell:active {
            transform: scale(0.96);
        }

        .message-area {
            margin-top: 18px;
            text-align: center;
            font-weight: bold;
            background: #000000aa;
            padding: 10px 18px;
            border-radius: 60px;
            color: #bbf0ff;
            backdrop-filter: blur(4px);
            font-size: 0.9rem;
        }

        .safe-zone-indicator {
            position: absolute;
            pointer-events: none;
            background: rgba(0, 255, 100, 0.2);
            border-radius: 12px;
            transition: all 0.2s;
        }

        @media (max-width: 650px) {
            .game-container {
                padding: 16px;
            }
            .stat-value {
                font-size: 1.3rem;
                min-width: 40px;
            }
            .cell {
                font-size: 0.9rem;
            }
            .diff-btn {
                padding: 3px 10px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <div class="stats">
            <div class="stat-item"><span class="stat-label">💣 MINY</span><span class="stat-value" id="mineCounter">0</span></div>
            <div class="stat-item"><span class="stat-label">🏆 SKÓRE</span><span class="stat-value" id="scoreCounter">0</span></div>
        </div>
        <div class="difficulty-selector">
            <button class="diff-btn" data-diff="beginner">🌱 ZAČÁTEČNÍK</button>
            <button class="diff-btn active" data-diff="intermediate">⭐ STŘEDNÍ</button>
            <button class="diff-btn" data-diff="expert">💀 EXPERT</button>
        </div>
        <button class="reset-btn" id="resetGameBtn">💣 NOVÁ HRA</button>
    </div>
    <div id="boardContainer" class="board"></div>
    <div class="message-area" id="gameMessage">
        ✨ BEZPEČNÝ START ✨ První klik vytvoří zónu bez min (3x3) – nemůžeš trefit bombu!
    </div>
</div>

<script>
    (function(){
        // ---------- NASTAVENÍ OBTÍŽNOSTI ----------
        const DIFFICULTY = {
            beginner: { rows: 8, cols: 8, mines: 10, name: "ZAČÁTEČNÍK" },
            intermediate: { rows: 12, cols: 12, mines: 30, name: "STŘEDNÍ" },
            expert: { rows: 16, cols: 16, mines: 55, name: "EXPERT" }
        };
        
        let currentDiff = "intermediate";
        let rows = DIFFICULTY.intermediate.rows;
        let cols = DIFFICULTY.intermediate.cols;
        let totalMines = DIFFICULTY.intermediate.mines;
        
        // Herní stav
        let board = [];         // 2D pole { isMine, revealed, flag, neighborMines }
        let gameActive = true;
        let firstMove = true;    // první klik - vytvoří bezpečnou zónu
        let flaggedCount = 0;
        let revealedCount = 0;
        let currentGameScore = 0;
        
        // Bezpečná zóna (pro první klik)
        let safeZoneCells = new Set(); // ukládá string "row,col" které jsou v bezpečné zóně
        
        // DOM elementy
        const boardContainer = document.getElementById('boardContainer');
        const mineCounterSpan = document.getElementById('mineCounter');
        const scoreCounterSpan = document.getElementById('scoreCounter');
        const gameMessageDiv = document.getElementById('gameMessage');
        
        function updateUI() {
            let remainingMines = totalMines - flaggedCount;
            mineCounterSpan.innerText = Math.max(0, remainingMines);
            scoreCounterSpan.innerText = currentGameScore;
        }
        
        function setMessage(msg, isError = false) {
            gameMessageDiv.innerHTML = msg;
            gameMessageDiv.style.color = isError ? "#ffaa88" : "#bbf0ff";
            if (!isError) {
                setTimeout(() => {
                    if (gameActive) gameMessageDiv.innerHTML = "💣 Levý klik = odkrytí | Pravý klik = vlajka | První klik = bezpečná zóna 💣";
                }, 3000);
            }
        }
        
        // výpočet sousedních min
        function calculateNeighbors(boardData, r, c, rowsCnt, colsCnt) {
            let count = 0;
            for(let dr = -1; dr <= 1; dr++) {
                for(let dc = -1; dc <= 1; dc++) {
                    if(dr === 0 && dc === 0) continue;
                    let nr = r + dr, nc = c + dc;
                    if(nr >= 0 && nr < rowsCnt && nc >= 0 && nc < colsCnt && boardData[nr][nc].isMine) count++;
                }
            }
            return count;
        }
        
        // Získání všech buněk v oblasti 3x3 kolem (safeRow, safeCol) s ořezáním okrajů
        function getSafeZoneArea(safeRow, safeCol) {
            const cells = [];
            for(let dr = -1; dr <= 1; dr++) {
                for(let dc = -1; dc <= 1; dc++) {
                    let nr = safeRow + dr;
                    let nc = safeCol + dc;
                    if(nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
                        cells.push([nr, nc]);
                    }
                }
            }
            return cells;
        }
        
        // Generování hracího pole s BEZPEČNOU ZÓNOU - v zadané oblasti nebudou žádné miny
        // safeZoneCells je pole souřadnic [row,col], které musí být bez min
        function generateBoardWithSafeZone(safeZoneCoordinates) {
            // vytvoř prázdné pole bez min
            let newBoard = Array(rows).fill().map(() => Array(cols).fill().map(() => ({
                isMine: false,
                revealed: false,
                flag: false,
                neighborMines: 0
            })));
            
            // Vytvořit Set pro rychlé vyhledávání bezpečných buněk
            const safeSet = new Set();
            for(let [r, c] of safeZoneCoordinates) {
                safeSet.add(`${r},${c}`);
            }
            
            // rozmístit miny - vyhnout se všem buňkám v bezpečné zóně
            let minesPlaced = 0;
            const maxAttempts = 5000;
            let attempts = 0;
            
            while(minesPlaced < totalMines && attempts < maxAttempts) {
                let randRow = Math.floor(Math.random() * rows);
                let randCol = Math.floor(Math.random() * cols);
                const cellKey = `${randRow},${randCol}`;
                
                // Nesmí být v bezpečné zóně a nesmí už mít minu
                if(!safeSet.has(cellKey) && !newBoard[randRow][randCol].isMine) {
                    newBoard[randRow][randCol].isMine = true;
                    minesPlaced++;
                }
                attempts++;
            }
            
            // Pokud se nepodařilo umístit všechny miny (extrémní případ, malé hřiště), doplníme je mimo safe zónu
            if(minesPlaced < totalMines) {
                for(let i = 0; i < rows && minesPlaced < totalMines; i++) {
                    for(let j = 0; j < cols && minesPlaced < totalMines; j++) {
                        const cellKey = `${i},${j}`;
                        if(!safeSet.has(cellKey) && !newBoard[i][j].isMine) {
                            newBoard[i][j].isMine = true;
                            minesPlaced++;
                        }
                    }
                }
            }
            
            // spočítat sousední miny
            for(let i = 0; i < rows; i++) {
                for(let j = 0; j < cols; j++) {
                    if(!newBoard[i][j].isMine) {
                        newBoard[i][j].neighborMines = calculateNeighbors(newBoard, i, j, rows, cols);
                    }
                }
            }
            
            return newBoard;
        }
        
        // Rekurzivní odkrývání prázdných polí (flood fill) - bezpečné, kontroluje hranice
        function revealCell(row, col) {
            if(!gameActive) return;
            if(row < 0 || row >= rows || col < 0 || col >= cols) return;
            
            const cell = board[row][col];
            if(cell.revealed) return;
            if(cell.flag) return;
            
            cell.revealed = true;
            revealedCount++;
            
            // přidání bodů za odkrytí
            if(!cell.isMine) {
                let points = 5 + (cell.neighborMines * 2);
                currentGameScore += points;
                updateUI();
            }
            
            if(cell.isMine) {
                // hráč klikl na minu - konec hry (teoreticky by se nemělo stát při prvním tahu, ale pro jistotu)
                gameActive = false;
                setMessage(`💥 BUM! Šlápl jsi na minu! Konečné skóre: ${currentGameScore} 💥`, true);
                revealAllMines();
                return;
            }
            
            // pokud je sousedních min 0, odkrýváme okolí
            if(cell.neighborMines === 0) {
                for(let dr = -1; dr <= 1; dr++) {
                    for(let dc = -1; dc <= 1; dc++) {
                        if(dr === 0 && dc === 0) continue;
                        let nr = row + dr, nc = col + dc;
                        if(nr >= 0 && nr < rows && nc >= 0 && nc < cols && 
                           !board[nr][nc].revealed && !board[nr][nc].flag && !board[nr][nc].isMine) {
                            revealCell(nr, nc);
                        }
                    }
                }
            }
            
            // kontrola výhry
            checkWin();
        }
        
        function checkWin() {
            let safeCellsCount = rows * cols - totalMines;
            if(revealedCount === safeCellsCount && gameActive) {
                gameActive = false;
                let winBonus = Math.floor(safeCellsCount * 3.5);
                currentGameScore += winBonus;
                updateUI();
                setMessage(`🏆 VÍTĚZSTVÍ! 🏆 Objevil jsi všechna bezpečná pole! Skóre: ${currentGameScore} + bonus ${winBonus} 🏆`);
                triggerConfetti();
                renderBoard();
            }
        }
        
        function revealAllMines() {
            for(let i=0; i<rows; i++) {
                for(let j=0; j<cols; j++) {
                    if(board[i][j].isMine) {
                        board[i][j].revealed = true;
                    }
                }
            }
            renderBoard();
        }
        
        // označení vlajky
        function toggleFlag(row, col) {
            if(!gameActive) return;
            const cell = board[row][col];
            if(cell.revealed) return;
            
            if(!cell.flag && flaggedCount >= totalMines) {
                setMessage("⚠️ Už nemůžeš umístit více vlajek! Odstraň nějakou nejdřív.", true);
                return;
            }
            
            cell.flag = !cell.flag;
            if(cell.flag) flaggedCount++;
            else flaggedCount--;
            updateUI();
            renderBoard();
            
            // rychlá kontrola výhry (všechny miny označeny + vše odkryto)
            let allMinesFlagged = true;
            let allSafeRevealed = true;
            for(let i=0;i<rows;i++){
                for(let j=0;j<cols;j++){
                    if(board[i][j].isMine && !board[i][j].flag) allMinesFlagged = false;
                    if(!board[i][j].isMine && !board[i][j].revealed) allSafeRevealed = false;
                }
            }
            if(allMinesFlagged && allSafeRevealed && gameActive) {
                gameActive = false;
                let bonus = 500;
                currentGameScore += bonus;
                updateUI();
                setMessage(`🎉 IMPRESSIVNÍ! Všechny miny označeny + pole odkryta! +${bonus} bodů! 🎉`);
                triggerConfetti();
                renderBoard();
            }
        }
        
        // HLAVNÍ FUNKCE PRO PRVNÍ KLIK - vytvoří bezpečnou zónu 3x3 a vygeneruje board
        function firstClickReveal(row, col) {
            // 1. Získat bezpečnou zónu (3x3 kolem kliku)
            const safeZone = getSafeZoneArea(row, col);
            safeZoneCells.clear();
            for(let [r,c] of safeZone) {
                safeZoneCells.add(`${r},${c}`);
            }
            
            // 2. Vygenerovat board s tím, že v safeZone nejsou miny
            board = generateBoardWithSafeZone(safeZone);
            
            // 3. Odkrýt celou bezpečnou zónu (aby hráč viděl, kde může začít)
            for(let [r,c] of safeZone) {
                if(!board[r][c].isMine && !board[r][c].revealed) {
                    // Použijeme speciální flood fill pro plynulé odkrývání, ale aby se odkryla celá oblast
                    revealCell(r, c);
                }
            }
            
            // 4. Zajistit, že kliknutá buňka je odhalená (může být již z flood fill)
            if(!board[row][col].revealed && !board[row][col].isMine) {
                revealCell(row, col);
            }
            
            renderBoard();
            setMessage(`✅ BEZPEČNÁ ZÓNA 3x3 vytvořena! Žádné miny v okolí kliku. Pokračuj bezpečně. ✅`);
        }
        
        // obsluha kliku
        function handleCellClick(e, row, col, isRightClick = false) {
            e.preventDefault();
            if(!gameActive) return;
            
            // PRVNÍ TAH - vždy vytvoří bezpečnou zónu (nemůže trefit bombu)
            if(firstMove && !isRightClick) {
                firstMove = false;
                firstClickReveal(row, col);
                return;
            }
            
            // Pokud je první tah a hráč zkusí pravý klik, upozorníme ho
            if(firstMove && isRightClick) {
                setMessage("⚠️ Nejprve klikni levým tlačítkem pro vytvoření bezpečné zóny! ⚠️", true);
                return;
            }
            
            // Pravý klik - vlajka
            if(isRightClick) {
                toggleFlag(row, col);
                return;
            }
            
            // Levý klik (po prvním tahu)
            const cell = board[row][col];
            if(cell.flag) {
                setMessage("❌ Odstraň nejdříve vlajku (pravým klikem)", true);
                return;
            }
            if(cell.revealed) return;
            
            revealCell(row, col);
            renderBoard();
        }
        
        // ---------- RENDER GRIDU ----------
        function renderBoard() {
            if(!board || board.length === 0) return;
            
            const cellSize = Math.min(70, Math.floor(500 / cols));
            boardContainer.style.gridTemplateColumns = `repeat(${cols}, minmax(32px, ${cellSize}px))`;
            boardContainer.innerHTML = '';
            
            for(let i=0; i<rows; i++) {
                for(let j=0; j<cols; j++) {
                    const cell = board[i][j];
                    const cellDiv = document.createElement('div');
                    cellDiv.className = 'cell';
                    if(cell.revealed) cellDiv.classList.add('revealed');
                    if(cell.flag && !cell.revealed) cellDiv.classList.add('flagged');
                    
                    let content = '';
                    if(cell.revealed) {
                        if(cell.isMine) {
                            content = '💣';
                        } else {
                            let neigh = cell.neighborMines;
                            if(neigh === 0) content = '';
                            else content = neigh;
                        }
                    } else {
                        content = '';
                    }
                    cellDiv.innerText = content;
                    
                    // Barevné číslování
                    if(cell.revealed && !cell.isMine && cell.neighborMines > 0) {
                        const colors = ['', '#1976D2', '#2E7D32', '#C62828', '#6A1B9A', '#FF8C00', '#0097A7', '#000000', '#5D4037'];
                        cellDiv.style.color = colors[cell.neighborMines] || '#dd8800';
                        cellDiv.style.fontWeight = 'bold';
                    } else if(cell.revealed && cell.isMine) {
                        cellDiv.style.color = '#d32f2f';
                        cellDiv.style.textShadow = '0 0 4px red';
                    } else {
                        cellDiv.style.color = '#ffd966';
                    }
                    
                    // eventy pro myš
                    cellDiv.addEventListener('click', (e) => {
                        e.stopPropagation();
                        handleCellClick(e, i, j, false);
                    });
                    cellDiv.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        handleCellClick(e, i, j, true);
                    });
                    
                    // podpora touch (dlouhý stisk jako pravé tlačítko)
                    let touchTimer = null;
                    cellDiv.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        touchTimer = setTimeout(() => {
                            handleCellClick(e, i, j, true);
                            touchTimer = null;
                        }, 500);
                    });
                    cellDiv.addEventListener('touchend', (e) => {
                        if(touchTimer) {
                            clearTimeout(touchTimer);
                            handleCellClick(e, i, j, false);
                            touchTimer = null;
                        }
                    });
                    cellDiv.addEventListener('touchmove', () => {
                        if(touchTimer) clearTimeout(touchTimer);
                    });
                    
                    boardContainer.appendChild(cellDiv);
                }
            }
        }
        
        // confetti efekt
        function triggerConfetti() {
            const canvas = document.createElement('canvas');
            canvas.style.position = 'fixed';
            canvas.style.top = '0';
            canvas.style.left = '0';
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            canvas.style.pointerEvents = 'none';
            canvas.style.zIndex = '10000';
            document.body.appendChild(canvas);
            const confettiSettings = { target: canvas, max: 180, size: 1.3, animate: true, colors: [[255,200,50],[50,200,255],[255,80,120],[180,130,255]] };
            let confetti = new ConfettiGenerator(confettiSettings);
            confetti.render();
            setTimeout(() => {
                document.body.removeChild(canvas);
            }, 2800);
        }
        
        // Reset celé hry
        function resetGame() {
            gameActive = true;
            firstMove = true;
            flaggedCount = 0;
            revealedCount = 0;
            currentGameScore = 0;
            safeZoneCells.clear();
            
            // nastav parametry dle currentDiff
            let cfg = DIFFICULTY[currentDiff];
            rows = cfg.rows;
            cols = cfg.cols;
            totalMines = cfg.mines;
            
            // prázdná tabulka (placeholder) - vygenerujeme až při prvním kliku
            board = Array(rows).fill().map(() => Array(cols).fill().map(() => ({
                isMine: false,
                revealed: false,
                flag: false,
                neighborMines: 0
            })));
            
            updateUI();
            renderBoard();
            setMessage(`🎯 ${cfg.name} • ${totalMines} min • ✨ PRVNÍ KLIK = BEZPEČNÁ ZÓNA 3x3 ✨ Klikni kamkoliv pro start! 🎯`);
        }
        
        // Změna obtížnosti
        function setDifficulty(diffKey) {
            currentDiff = diffKey;
            resetGame();
            
            // vizuální aktivní tlačítka
            document.querySelectorAll('.diff-btn').forEach(btn => {
                if(btn.getAttribute('data-diff') === diffKey) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }
        
        // ---------- CONFETTI GENERATOR ----------
        function ConfettiGenerator(params){
            let target = params.target;
            let max = params.max || 100;
            let size = params.size || 1;
            let animate = params.animate !== false;
            let colors = params.colors || [[165,104,246],[230,61,135],[0,199,228],[253,214,126]];
            let props = params.props || ['circle','square'];
            let ctx = target.getContext('2d');
            let width = window.innerWidth;
            let height = window.innerHeight;
            let particles = [];
            let animId = null;
            target.width = width;
            target.height = height;
            function random(min,max){ return Math.random()*(max-min)+min; }
            function init(){
                for(let i=0;i<max;i++){
                    let color = colors[Math.floor(Math.random()*colors.length)];
                    let shape = props[Math.floor(Math.random()*props.length)];
                    particles.push({
                        x: random(0,width), y: random(0,height),
                        size: random(0.5,size*2), speedY: random(2,9), speedX: random(-2.5,2.5),
                        color: `rgb(${color[0]},${color[1]},${color[2]})`, shape: shape, rot: random(0,360)
                    });
                }
                animateConfetti();
            }
            function draw(){
                ctx.clearRect(0,0,width,height);
                for(let p of particles){
                    ctx.save();
                    ctx.translate(p.x,p.y);
                    ctx.rotate(p.rot*Math.PI/180);
                    ctx.fillStyle = p.color;
                    if(p.shape === 'circle'){
                        ctx.beginPath();
                        ctx.arc(0,0,p.size,0,Math.PI*2);
                        ctx.fill();
                    } else {
                        ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);
                    }
                    ctx.restore();
                    p.y += p.speedY;
                    p.x += p.speedX;
                    p.rot += 7;
                    if(p.y > height+40){ p.y = -20; p.x = random(0,width); }
                    if(p.x > width+50) p.x = -50;
                    if(p.x < -50) p.x = width+30;
                }
                if(animate) animId = requestAnimationFrame(draw);
            }
            function animateConfetti(){ draw(); }
            this.render = function(){ init(); };
            this.clear = function(){ if(animId) cancelAnimationFrame(animId); ctx.clearRect(0,0,width,height); };
        }
        
        // eventy
        document.querySelectorAll('.diff-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let diff = btn.getAttribute('data-diff');
                if(diff) setDifficulty(diff);
            });
        });
        document.getElementById('resetGameBtn').addEventListener('click', () => {
            resetGame();
        });
        
        // spuštění hry
        resetGame();
    })();
</script>
</body>
</html>
