<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tetris 2025 – vylepšená verze</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle at 50% 50%, #0a1f1a, #000);
      color: #eee;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      user-select: none;
    }

    #container {
      display: flex;
      gap: 50px;
      align-items: flex-start;
      perspective: 1200px;
    }

    #game-area {
      position: relative;
      transform-style: preserve-3d;
    }

    canvas {
      image-rendering: pixelated;
      border: 3px solid #333;
      border-radius: 12px;
      background: #0a0a0a;
      box-shadow: 
        0 0 40px rgba(0, 220, 180, 0.2),
        inset 0 0 60px rgba(0,0,0,0.8);
    }

    #side-panel {
      width: 200px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .box {
      background: rgba(20,20,30,0.7);
      border: 1px solid #444;
      border-radius: 12px;
      padding: 16px 12px;
      text-align: center;
      backdrop-filter: blur(4px);
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    #next-canvas, #hold-canvas {
      background: rgba(0,0,0,0.6);
      border: 2px solid #555;
      border-radius: 8px;
    }

    h2 { 
      margin: 0 0 10px 0; 
      font-size: 1.2rem; 
      color: #0fc; 
      text-shadow: 0 0 8px #0fc;
    }
    .stat { 
      font-size: 2rem; 
      font-weight: bold; 
      color: #0ff; 
      text-shadow: 0 0 12px #0ff;
    }

    #message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 5rem;
      font-weight: bold;
      color: #f44;
      text-shadow: 0 0 40px #f00, 0 0 80px #800;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.6s;
      z-index: 10;
    }

    #pause-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5.5rem;
      color: #ff0;
      font-weight: bold;
      text-shadow: 0 0 50px #ff0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
      z-index: 5;
    }

    .clear-flash {
      animation: flash 0.4s ease-out;
    }

    @keyframes flash {
      0% { background: rgba(255,255,100,0.4); }
      100% { background: transparent; }
    }
  </style>
</head>
<body>

<div id="container">
  <div id="game-area">
    <canvas id="tetris" width="320" height="640"></canvas>
    <div id="message">GAME OVER</div>
    <div id="pause-overlay">PAUSE</div>
  </div>

  <div id="side-panel">
    <div class="box">
      <h2>Score</h2>
      <div id="score" class="stat">0</div>
    </div>
    <div class="box">
      <h2>Level</h2>
      <div id="level" class="stat">1</div>
    </div>
    <div class="box">
      <h2>Lines</h2>
      <div id="lines" class="stat">0</div>
    </div>

    <div class="box">
      <h2>Next</h2>
      <canvas id="next" width="140" height="140"></canvas>
    </div>

    <div class="box">
      <h2>Hold</h2>
      <canvas id="hold" width="140" height="140"></canvas>
    </div>

    <div class="box" style="font-size:0.95rem; color:#ccc; text-align:left; line-height:1.5;">
      <strong>Ovládání:</strong><br>
      ← →    Pohyb<br>
      ↑      Otočit (nebo X)<br>
      ↓      Soft drop<br>
      Mezerník  Hard drop<br>
      C / Shift  Hold<br>
      P      Pauza / resume
    </div>
  </div>
</div>

<script>
// ================================================
//          TETRIS – vylepšená verze 2025
// ================================================

const canvas = document.getElementById('tetris');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('next');
const nextCtx = nextCanvas.getContext('2d');
const holdCanvas = document.getElementById('hold');
const holdCtx = holdCanvas.getContext('2d');

const COLS = 10;
const ROWS = 20;
const BLOCK = 32;

let board = Array(ROWS).fill().map(()=>Array(COLS).fill(0));
let score = 0;
let lines = 0;
let level = 1;
let dropCounter = 0;
let dropInterval = 1000;
let lastTime = 0;
let gameOver = false;
let paused = false;

let currentPiece = null;
let nextPiece = null;
let heldPiece = null;
let canHold = true;

const colors = [
  null,
  {main: '#4de6ff', light: '#a5f0ff'}, // I
  {main: '#ffe64d', light: '#fff7a5'}, // O
  {main: '#b366ff', light: '#d9a3ff'}, // T
  {main: '#66ff66', light: '#a3ffa3'}, // S
  {main: '#ff4d4d', light: '#ffa3a3'}, // Z
  {main: '#4d79ff', light: '#a3b8ff'}, // J
  {main: '#ff9933', light: '#ffcc99'}  // L
];

// Tvary – I je teď správně 4×1 (a otočený 1×4)
const tetrominoes = [
  null,
  [[1,1,1,1]],               // I – vodorovně
  [[1,1],[1,1]],             // O
  [[0,1,0],[1,1,1]],         // T
  [[0,1,1],[1,1,0]],         // S
  [[1,1,0],[0,1,1]],         // Z
  [[1,0,0],[1,1,1]],         // J
  [[0,0,1],[1,1,1]]          // L
];

function createPiece(type) {
  const shape = tetrominoes[type];
  const h = shape.length;
  const w = shape[0].length;
  const matrix = Array(5).fill().map(()=>Array(5).fill(0)); // 5×5 → bezpečná rotace

  // centrovanější umístění
  const ox = Math.floor((5 - w)/2);
  const oy = Math.floor((5 - h)/2);

  shape.forEach((row,y)=>{
    row.forEach((val,x)=>{
      if (val) matrix[oy + y][ox + x] = type;
    });
  });

  return {
    matrix,
    type,
    x: Math.floor(COLS/2 - 2.5),
    y: type === 1 ? -1 : 0   // I začíná výš
  };
}

function getRandomPiece() {
  return Math.floor(Math.random() * 7) + 1;
}

function drawBlock(x, y, color, ctxToUse = ctx, size = BLOCK) {
  const gx = x * size;
  const gy = y * size;

  // gradient
  const grad = ctxToUse.createLinearGradient(gx, gy, gx+size, gy+size);
  grad.addColorStop(0, color.light);
  grad.addColorStop(0.4, color.main);
  grad.addColorStop(1, color.main);

  ctxToUse.fillStyle = grad;
  ctxToUse.fillRect(gx+1, gy+1, size-2, size-2);

  // lesk
  ctxToUse.fillStyle = 'rgba(255,255,255,0.45)';
  ctxToUse.fillRect(gx+3, gy+3, size*0.4, size*0.4);

  // obrys
  ctxToUse.strokeStyle = 'rgba(0,0,0,0.7)';
  ctxToUse.lineWidth = 1.5;
  ctxToUse.strokeRect(gx+1, gy+1, size-2, size-2);
}

function drawBoard() {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // jemná mřížka
  ctx.strokeStyle = '#1a1a2a';
  ctx.lineWidth = 1;
  for (let i = 1; i < COLS; i++) {
    ctx.beginPath();
    ctx.moveTo(i*BLOCK, 0);
    ctx.lineTo(i*BLOCK, canvas.height);
    ctx.stroke();
  }
  for (let i = 1; i < ROWS; i++) {
    ctx.beginPath();
    ctx.moveTo(0, i*BLOCK);
    ctx.lineTo(canvas.width, i*BLOCK);
    ctx.stroke();
  }

  board.forEach((row,y) => {
    row.forEach((val,x) => {
      if (val) drawBlock(x, y, colors[val]);
    });
  });
}

function drawPiece(piece, ox = 0, oy = 0, ctxToUse = ctx, alpha = 1) {
  ctxToUse.globalAlpha = alpha;
  piece.matrix.forEach((row,y) => {
    row.forEach((val,x) => {
      if (val) {
        drawBlock(piece.x + x + ox, piece.y + y + oy, colors[val], ctxToUse);
      }
    });
  });
  ctxToUse.globalAlpha = 1;
}

function drawGhost() {
  if (!currentPiece) return;
  let gy = currentPiece.y;
  while (!collides(currentPiece.matrix, currentPiece.x, gy + 1)) gy++;
  ctx.globalAlpha = 0.18;
  ctx.filter = 'blur(1px)';
  drawPiece(currentPiece, 0, gy - currentPiece.y);
  ctx.filter = 'none';
  ctx.globalAlpha = 1;
}

function merge() {
  currentPiece.matrix.forEach((row,y) => {
    row.forEach((val,x) => {
      if (val) {
        const ny = currentPiece.y + y;
        if (ny >= 0 && ny < ROWS) {
          board[ny][currentPiece.x + x] = val;
        }
      }
    });
  });
}

function collides(matrix, px, py) {
  for (let y = 0; y < matrix.length; y++) {
    for (let x = 0; x < matrix[y].length; x++) {
      if (matrix[y][x]) {
        const nx = px + x;
        const ny = py + y;
        if (nx < 0 || nx >= COLS || ny >= ROWS) return true;
        if (ny >= 0 && board[ny][nx]) return true;
      }
    }
  }
  return false;
}

function rotateMatrix(m) {
  const n = m.length;
  const rotated = Array(n).fill().map(()=>Array(n).fill(0));
  for (let y = 0; y < n; y++) {
    for (let x = 0; x < n; x++) {
      rotated[x][n-1-y] = m[y][x];
    }
  }
  return rotated;
}

function playerRotate() {
  const old = currentPiece.matrix;
  let next = rotateMatrix(old);

  // SRS wall kick – jednoduchá verze
  const kicks = currentPiece.type === 1 ? [0,-1,1,-2,2] : [0,-1,1]; // I má větší kick

  for (let kick of kicks) {
    if (!collides(next, currentPiece.x + kick, currentPiece.y)) {
      currentPiece.matrix = next;
      currentPiece.x += kick;
      return;
    }
  }
}

function playerDrop() {
  if (!collides(currentPiece.matrix, currentPiece.x, currentPiece.y + 1)) {
    currentPiece.y++;
    dropCounter = 0;
  } else {
    merge();
    clearLines();
    spawnPiece();
  }
}

function hardDrop() {
  let distance = 0;
  while (!collides(currentPiece.matrix, currentPiece.x, currentPiece.y + 1)) {
    currentPiece.y++;
    distance++;
  }
  score += distance * 2;
  playerDrop();
}

function clearLines() {
  let cleared = 0;
  for (let y = ROWS - 1; y >= 0; y--) {
    if (board[y].every(v => v !== 0)) {
      board.splice(y, 1);
      board.unshift(Array(COLS).fill(0));
      cleared++;
      y++; // znovu zkontrolujeme stejný index
    }
  }

  if (cleared > 0) {
    const base = [0, 100, 300, 500, 800][cleared];
    score += base * level;
    lines += cleared;

    if (lines >= level * 10) {
      level++;
      dropInterval = Math.max(80, 1000 - (level - 1) * 90);
    }

    // vizuální feedback
    canvas.classList.add('clear-flash');
    setTimeout(() => canvas.classList.remove('clear-flash'), 400);
  }
}

function hold() {
  if (!canHold) return;
  canHold = false;

  if (!heldPiece) {
    heldPiece = {...currentPiece, x: 0, y: 0};
    spawnPiece();
  } else {
    const temp = {...currentPiece, x: 0, y: 0};
    currentPiece = {...heldPiece, x: Math.floor(COLS/2 - 2.5), y: 0};
    heldPiece = temp;
  }
  drawHold();
}

function spawnPiece() {
  if (!nextPiece) nextPiece = createPiece(getRandomPiece());

  currentPiece = nextPiece;
  nextPiece = createPiece(getRandomPiece());

  canHold = true;

  drawNext();
  drawHold();

  if (collides(currentPiece.matrix, currentPiece.x, currentPiece.y)) {
    gameOver = true;
    document.getElementById('message').style.opacity = 1;
  }
}

function drawNext() {
  nextCtx.fillStyle = 'rgba(0,0,0,0.6)';
  nextCtx.fillRect(0,0,nextCanvas.width,nextCanvas.height);

  if (nextPiece) {
    const off = nextPiece.type === 1 ? 0.5 : 1;
    drawPiece(nextPiece, off, 1.2, nextCtx, 0.9);
  }
}

function drawHold() {
  holdCtx.fillStyle = 'rgba(0,0,0,0.6)';
  holdCtx.fillRect(0,0,holdCanvas.width,holdCanvas.height);

  if (heldPiece) {
    const off = heldPiece.type === 1 ? 0.5 : 1;
    drawPiece(heldPiece, off, 1.2, holdCtx, canHold ? 1 : 0.4);
  }
}

function update(time = 0) {
  if (gameOver || paused) return requestAnimationFrame(update);

  const delta = time - lastTime;
  lastTime = time;
  dropCounter += delta;

  if (dropCounter > dropInterval) {
    playerDrop();
    dropCounter = 0;
  }

  drawBoard();
  if (currentPiece) {
    drawGhost();
    drawPiece(currentPiece);
  }

  document.getElementById('score').textContent = score;
  document.getElementById('level').textContent = level;
  document.getElementById('lines').textContent = lines;

  requestAnimationFrame(update);
}

// ────────────────────────────────────────────────
// Ovládání
// ────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (gameOver) return;
  if (e.repeat) return;

  if (e.key.toLowerCase() === 'p') {
    paused = !paused;
    document.getElementById('pause-overlay').style.opacity = paused ? 1 : 0;
    if (!paused) {
      lastTime = performance.now();
      requestAnimationFrame(update);
    }
    return;
  }

  if (paused) return;

  switch (e.key) {
    case 'ArrowLeft':  
      if (!collides(currentPiece.matrix, currentPiece.x-1, currentPiece.y)) currentPiece.x--; 
      break;
    case 'ArrowRight': 
      if (!collides(currentPiece.matrix, currentPiece.x+1, currentPiece.y)) currentPiece.x++; 
      break;
    case 'ArrowDown':  
      playerDrop(); 
      break;
    case 'ArrowUp':
    case 'x':
    case 'X':
      playerRotate(); 
      break;
    case ' ':
      e.preventDefault();
      hardDrop();
      break;
    case 'c':
    case 'C':
    case 'Shift':
      hold();
      break;
  }
});

// Start
spawnPiece();
update();
</script>
</body>
</html>
